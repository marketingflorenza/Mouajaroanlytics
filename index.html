<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mounjaro Injection Tracking - Summary Dashboard Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Sarabun', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .sort-header { cursor: pointer; user-select: none; transition: background-color 0.2s; }
        .sort-header:hover { background-color: #f1f5f9; }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(59,130,246,0.4); }
            70% { box-shadow: 0 0 0 12px rgba(59,130,246,0); }
            100% { box-shadow: 0 0 0 0 rgba(59,130,246,0); }
        }
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes typing-dot {
            0%, 80%, 100% { opacity: 0; transform: scale(0.7); }
            40% { opacity: 1; transform: scale(1); }
        }

        .ai-shimmer-text {
            background: linear-gradient(90deg, #1e3a5f, #3b82f6, #60a5fa, #3b82f6, #1e3a5f);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s linear infinite;
        }
        .ai-panel {
            animation: fadeInUp 0.5s ease-out;
        }
        .ai-loading-dot {
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #3b82f6;
            animation: typing-dot 1.4s ease-in-out infinite;
        }
        .ai-loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .ai-loading-dot:nth-child(3) { animation-delay: 0.4s; }

        .ai-btn-pulse { animation: pulse-ring 2s infinite; }
        .spin { animation: spin-slow 1.2s linear infinite; }

        .report-section { animation: fadeInUp 0.4s ease-out both; }
        .report-section:nth-child(1) { animation-delay: 0.05s; }
        .report-section:nth-child(2) { animation-delay: 0.1s; }
        .report-section:nth-child(3) { animation-delay: 0.15s; }
        .report-section:nth-child(4) { animation-delay: 0.2s; }
        .report-section:nth-child(5) { animation-delay: 0.25s; }

        .highlight-number {
            font-size: 1.4em;
            font-weight: 900;
            color: #2563eb;
        }

        .ai-report-content h2 {
            font-size: 1rem;
            font-weight: 800;
            color: #1e40af;
            margin: 0 0 8px 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .ai-report-content p {
            font-size: 0.875rem;
            color: #374151;
            line-height: 1.75;
            margin: 0 0 6px 0;
        }
        .ai-report-content ul {
            list-style: none;
            padding: 0;
            margin: 0 0 6px 0;
        }
        .ai-report-content ul li {
            font-size: 0.82rem;
            color: #374151;
            padding: 4px 0 4px 18px;
            position: relative;
            line-height: 1.6;
        }
        .ai-report-content ul li::before {
            content: '▸';
            position: absolute;
            left: 0;
            color: #3b82f6;
            font-size: 0.75rem;
        }
        .ai-report-content .tag-new {
            display: inline-block;
            background: #d1fae5;
            color: #065f46;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 1px 7px;
            border-radius: 999px;
            margin-left: 4px;
        }
        .ai-report-content .tag-warn {
            display: inline-block;
            background: #fef3c7;
            color: #92400e;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 1px 7px;
            border-radius: 999px;
            margin-left: 4px;
        }
        .ai-report-content .tag-info {
            display: inline-block;
            background: #dbeafe;
            color: #1e40af;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 1px 7px;
            border-radius: 999px;
            margin-left: 4px;
        }
        .divider { border: none; border-top: 1px solid #e2e8f0; margin: 12px 0; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useRef, useCallback } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                upload: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4m14-7-5-5-5 5m5-5v12"/>,
                download: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4m-7-11v12m-4-4 4 4 4-4"/>,
                search: <><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></>,
                calendar: <><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></>,
                filter: <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>,
                user: <><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>,
                users: <><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
                dollar: <><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></>,
                syringe: <><path d="m18 2 4 4"/><path d="m17 7 3-3"/><path d="M19 9 8.7 19.3c-.7.7-1.6 1.2-2.6 1.5l-4.1.9.9-4.1c.3-1 1.2-1.9 1.5-2.6L14.7 4.7"/><path d="m18 5 3 3"/><path d="m14 10 4 4"/></>,
                refresh: <><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></>,
                shopping: <><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></>,
                x: <path d="M18 6 6 18M6 6l12 12"/>,
                arrowUp: <path d="m18 15-6-6-6 6"/>,
                arrowDown: <path d="m6 9 6 6 6-6"/>,
                arrowUpDown: <><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></>,
                sparkles: <><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></>,
                copy: <><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></>,
                check: <path d="M20 6 9 17l-5-5"/>,
                brain: <><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/><path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"/><path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"/><path d="M17.599 6.5a3 3 0 0 0 .399-1.375"/><path d="M6.003 5.125A3 3 0 0 0 6.401 6.5"/><path d="M3.477 10.896a4 4 0 0 1 .585-.396"/><path d="M19.938 10.5a4 4 0 0 1 .585.396"/><path d="M6 18a4 4 0 0 1-1.967-.516"/><path d="M19.967 17.484A4 4 0 0 1 18 18"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        // ─── AI Summary Panel ──────────────────────────────────────────────────────
        const AISummaryPanel = ({ stats, filteredData, startDate, endDate }) => {
            const [report, setReport] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [copied, setCopied] = useState(false);
            const [isOpen, setIsOpen] = useState(false);

            const buildPrompt = () => {
                const periodLabel = startDate && endDate
                    ? `ระหว่างวันที่ ${startDate} ถึง ${endDate}`
                    : startDate ? `ตั้งแต่วันที่ ${startDate}`
                    : endDate ? `ถึงวันที่ ${endDate}`
                    : "ทั้งหมด (ไม่ระบุช่วงเวลา)";

                // Top injectors
                const topInjectors = [...filteredData]
                    .filter(d => d.mounjaroInjections > 0)
                    .sort((a, b) => b.mounjaroInjections - a.mounjaroInjections)
                    .slice(0, 5)
                    .map(d => `${d.name} (HN:${d.hn}) ฉีด ${d.mounjaroInjections} ครั้ง ยอด ฿${d.mounjaroPaid.toLocaleString()}`);

                // Top spenders
                const topSpenders = [...filteredData]
                    .sort((a, b) => b.totalPaid - a.totalPaid)
                    .slice(0, 5)
                    .map(d => `${d.name} (HN:${d.hn}) ยอดรวม ฿${d.totalPaid.toLocaleString()}`);

                // Injection distribution
                const injectDist = { '1': 0, '2-3': 0, '4-6': 0, '7+': 0 };
                filteredData.forEach(d => {
                    if (d.mounjaroInjections === 1) injectDist['1']++;
                    else if (d.mounjaroInjections >= 2 && d.mounjaroInjections <= 3) injectDist['2-3']++;
                    else if (d.mounjaroInjections >= 4 && d.mounjaroInjections <= 6) injectDist['4-6']++;
                    else if (d.mounjaroInjections >= 7) injectDist['7+']++;
                });

                const avgInjectPerCustomer = stats.injectionCustomers > 0
                    ? (stats.mounjaroInjections / stats.injectionCustomers).toFixed(1) : 0;
                const avgSpendPerCustomer = filteredData.length > 0
                    ? Math.round(stats.revenue / filteredData.length).toLocaleString() : 0;
                const newRatio = filteredData.length > 0
                    ? Math.round((stats.newCount / filteredData.length) * 100) : 0;
                const retentionRate = stats.mounjaroUniqueCustomers > 0
                    ? Math.round((stats.injectionCustomers / stats.mounjaroUniqueCustomers) * 100) : 0;

                return `คุณคือผู้ช่วย AI วิเคราะห์ธุรกิจคลินิกเฉพาะทางด้าน Mounjaro (ยาฉีดลดน้ำหนัก)
จงสรุปรายงานผลการดำเนินธุรกิจเป็นภาษาไทยแบบมืออาชีพ กระชับ และอ่านเข้าใจง่าย

---
ข้อมูลสรุปช่วงเวลา: ${periodLabel}

📊 ภาพรวมรายได้:
- ยอดขายรวมกลุ่มเป้าหมาย: ฿${stats.revenue.toLocaleString()} บาท
- ยอดขายเฉพาะ Mounjaro: ฿${stats.mounjaroRevenue.toLocaleString()} บาท
- สัดส่วน Mounjaro ต่อยอดรวม: ${stats.revenue > 0 ? Math.round((stats.mounjaroRevenue / stats.revenue) * 100) : 0}%

💉 ข้อมูลการฉีด:
- ฉีด Mounjaro ทั้งหมด: ${stats.mounjaroInjections} ครั้ง
- ลูกค้าที่ฉีดจริง: ${stats.injectionCustomers} ราย
- เฉลี่ยต่อลูกค้า: ${avgInjectPerCustomer} ครั้ง/คน

👥 ข้อมูลลูกค้า:
- ลูกค้าทั้งหมด: ${filteredData.length} ราย (HN)
- ลูกค้า Mounjaro: ${stats.mounjaroUniqueCustomers} ราย
- ลูกค้าใหม่: ${stats.newCount} ราย (${newRatio}%)
- ลูกค้าเก่า: ${stats.oldCount} ราย
- ยอดซื้อเฉลี่ยต่อราย: ฿${avgSpendPerCustomer} บาท
- อัตราการฉีดจริง (Retention): ${retentionRate}%

📈 การกระจายจำนวนครั้งฉีดต่อลูกค้า:
- ฉีด 1 ครั้ง: ${injectDist['1']} ราย
- ฉีด 2-3 ครั้ง: ${injectDist['2-3']} ราย
- ฉีด 4-6 ครั้ง: ${injectDist['4-6']} ราย
- ฉีด 7 ครั้งขึ้นไป: ${injectDist['7+']} ราย

🏆 Top 5 ลูกค้าที่ฉีดมากที่สุด:
${topInjectors.length > 0 ? topInjectors.join('\n') : 'ไม่มีข้อมูล'}

💰 Top 5 ลูกค้ายอดใช้จ่ายสูงสุด:
${topSpenders.length > 0 ? topSpenders.join('\n') : 'ไม่มีข้อมูล'}
---

จงสรุปรายงานเป็น JSON ในรูปแบบนี้เท่านั้น ไม่ต้องมี markdown fence:
{
  "headline": "ประโยคสรุปภาพรวมสั้น ๆ ไม่เกิน 2 บรรทัด",
  "period": "ช่วงเวลาที่วิเคราะห์",
  "keyMetrics": [
    { "label": "ชื่อตัวชี้วัด", "value": "ค่า", "note": "หมายเหตุสั้น ๆ (ถ้ามี)", "trend": "up|down|neutral" }
  ],
  "insights": ["insight สำคัญ 3-5 ข้อ เป็นประโยค"],
  "topCustomers": [{ "name": "ชื่อ", "hn": "HN", "detail": "รายละเอียดสั้น" }],
  "recommendations": ["คำแนะนำเชิงกลยุทธ์ 2-4 ข้อ"],
  "riskFlags": ["สัญญาณเตือนหรือจุดที่ต้องระวัง (ถ้ามี)"]
}`;
            };

            const generateReport = async () => {
                if (filteredData.length === 0) {
                    setError("กรุณาอัปโหลดข้อมูลก่อน");
                    return;
                }
                setLoading(true);
                setError(null);
                setReport(null);
                setIsOpen(true);

                try {
                    const response = await fetch("https://api.anthropic.com/v1/messages", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            model: "claude-sonnet-4-20250514",
                            max_tokens: 1000,
                            messages: [{ role: "user", content: buildPrompt() }]
                        })
                    });

                    if (!response.ok) throw new Error(`API error: ${response.status}`);
                    const data = await response.json();
                    const text = data.content.map(b => b.text || "").join("");
                    const clean = text.replace(/```json|```/g, "").trim();
                    const parsed = JSON.parse(clean);
                    setReport(parsed);
                } catch (err) {
                    setError("ไม่สามารถสร้างรายงาน AI ได้: " + err.message);
                } finally {
                    setLoading(false);
                }
            };

            const copyReport = () => {
                if (!report) return;
                const text = [
                    `📋 AI SUMMARY REPORT`,
                    `${report.period}`,
                    ``,
                    `💡 ${report.headline}`,
                    ``,
                    `📊 ตัวชี้วัดหลัก:`,
                    ...(report.keyMetrics || []).map(m => `• ${m.label}: ${m.value}${m.note ? ` (${m.note})` : ''}`),
                    ``,
                    `🔍 Insights:`,
                    ...(report.insights || []).map(i => `• ${i}`),
                    ``,
                    `💰 ลูกค้าโดดเด่น:`,
                    ...(report.topCustomers || []).map(c => `• ${c.name} (${c.hn}): ${c.detail}`),
                    ``,
                    `📌 คำแนะนำ:`,
                    ...(report.recommendations || []).map(r => `• ${r}`),
                    ...(report.riskFlags && report.riskFlags.length > 0 ? [``, `⚠️ จุดเฝ้าระวัง:`, ...report.riskFlags.map(f => `• ${f}`)] : [])
                ].join('\n');
                navigator.clipboard.writeText(text).then(() => {
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                });
            };

            const trendIcon = (t) => t === 'up' ? '↑' : t === 'down' ? '↓' : '→';
            const trendColor = (t) => t === 'up' ? 'text-emerald-600' : t === 'down' ? 'text-rose-500' : 'text-slate-400';

            return (
                <div className="mb-8">
                    {/* Trigger Button */}
                    <button
                        onClick={generateReport}
                        disabled={loading || filteredData.length === 0}
                        className={`w-full flex items-center justify-center gap-3 py-4 px-8 rounded-[2rem] font-black text-white transition-all
                            ${filteredData.length === 0
                                ? 'bg-slate-200 text-slate-400 cursor-not-allowed'
                                : loading
                                    ? 'bg-blue-500 cursor-wait'
                                    : 'bg-gradient-to-r from-blue-700 via-blue-600 to-indigo-600 hover:from-blue-800 hover:to-indigo-700 shadow-lg shadow-blue-300/50 ai-btn-pulse'
                            }`}
                    >
                        {loading ? (
                            <>
                                <svg className="spin" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/></svg>
                                <span className="ai-shimmer-text" style={{WebkitTextFillColor:'white'}}>กำลังวิเคราะห์ข้อมูล...</span>
                                <span className="flex gap-1 ml-1">
                                    <span className="ai-loading-dot"></span>
                                    <span className="ai-loading-dot"></span>
                                    <span className="ai-loading-dot"></span>
                                </span>
                            </>
                        ) : (
                            <>
                                <Icon name="sparkles" size={20} />
                                <span>สร้างรายงาน AI Summary</span>
                                <span className="text-blue-200 text-xs font-bold ml-1">Powered by Claude</span>
                            </>
                        )}
                    </button>

                    {/* Report Panel */}
                    {isOpen && (
                        <div className="ai-panel mt-4 bg-white rounded-[2rem] border-2 border-blue-100 shadow-2xl shadow-blue-100/60 overflow-hidden">
                            {/* Panel Header */}
                            <div className="bg-gradient-to-r from-blue-700 via-blue-600 to-indigo-600 px-8 py-5 flex justify-between items-center">
                                <div className="flex items-center gap-3">
                                    <div className="p-2 bg-white/20 rounded-xl">
                                        <Icon name="brain" size={20} className="text-white" />
                                    </div>
                                    <div>
                                        <p className="text-white font-black text-base leading-tight">AI Summary Report</p>
                                        <p className="text-blue-200 text-xs font-bold">วิเคราะห์โดย Claude AI</p>
                                    </div>
                                </div>
                                <div className="flex gap-2">
                                    {report && (
                                        <button onClick={copyReport} className="flex items-center gap-1.5 bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded-xl text-xs font-bold transition-all">
                                            <Icon name={copied ? "check" : "copy"} size={13} />
                                            {copied ? "คัดลอกแล้ว!" : "คัดลอก"}
                                        </button>
                                    )}
                                    <button onClick={() => setIsOpen(false)} className="bg-white/20 hover:bg-white/30 text-white p-2 rounded-xl transition-all">
                                        <Icon name="x" size={14} />
                                    </button>
                                </div>
                            </div>

                            <div className="p-8">
                                {/* Error */}
                                {error && (
                                    <div className="p-4 bg-rose-50 border border-rose-200 text-rose-700 rounded-2xl text-sm font-bold flex gap-2 items-center">
                                        <Icon name="x" size={16} className="text-rose-500 shrink-0" />
                                        {error}
                                    </div>
                                )}

                                {/* Loading state */}
                                {loading && !report && (
                                    <div className="flex flex-col items-center justify-center py-12 gap-4">
                                        <div className="flex gap-2">
                                            <span className="ai-loading-dot" style={{width:'10px',height:'10px'}}></span>
                                            <span className="ai-loading-dot" style={{width:'10px',height:'10px'}}></span>
                                            <span className="ai-loading-dot" style={{width:'10px',height:'10px'}}></span>
                                        </div>
                                        <p className="text-slate-400 font-bold text-sm">AI กำลังประมวลผลข้อมูล...</p>
                                    </div>
                                )}

                                {/* Report Content */}
                                {report && (
                                    <div className="ai-report-content space-y-5">
                                        {/* Headline */}
                                        <div className="report-section bg-blue-50 border border-blue-100 rounded-2xl p-5">
                                            <div className="flex items-start gap-3">
                                                <span className="text-2xl mt-0.5">💡</span>
                                                <div>
                                                    <p className="text-[10px] font-black uppercase text-blue-500 tracking-widest mb-1">{report.period}</p>
                                                    <p className="font-black text-slate-800 text-base leading-snug">{report.headline}</p>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Key Metrics */}
                                        {report.keyMetrics && report.keyMetrics.length > 0 && (
                                            <div className="report-section">
                                                <h2>📊 ตัวชี้วัดสำคัญ</h2>
                                                <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                                                    {report.keyMetrics.map((m, i) => (
                                                        <div key={i} className="bg-slate-50 border border-slate-100 rounded-2xl p-4">
                                                            <p className="text-[9px] font-black uppercase text-slate-400 tracking-widest mb-1">{m.label}</p>
                                                            <p className={`text-lg font-black leading-tight ${trendColor(m.trend)}`}>
                                                                {trendIcon(m.trend)} {m.value}
                                                            </p>
                                                            {m.note && <p className="text-[10px] text-slate-400 font-bold mt-1">{m.note}</p>}
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        <hr className="divider" />

                                        {/* Insights */}
                                        {report.insights && report.insights.length > 0 && (
                                            <div className="report-section">
                                                <h2>🔍 สิ่งที่ค้นพบ</h2>
                                                <ul>
                                                    {report.insights.map((ins, i) => (
                                                        <li key={i}>{ins}</li>
                                                    ))}
                                                </ul>
                                            </div>
                                        )}

                                        {/* Top Customers */}
                                        {report.topCustomers && report.topCustomers.length > 0 && (
                                            <div className="report-section">
                                                <h2>🏆 ลูกค้าโดดเด่น</h2>
                                                <div className="space-y-2">
                                                    {report.topCustomers.map((c, i) => (
                                                        <div key={i} className="flex items-start gap-3 bg-slate-50 rounded-xl px-4 py-3">
                                                            <span className="text-base font-black text-slate-300 w-5 shrink-0">{i + 1}</span>
                                                            <div>
                                                                <span className="font-black text-slate-800 text-sm">{c.name}</span>
                                                                <span className="tag-info ml-2">{c.hn}</span>
                                                                <p className="text-xs text-slate-500 mt-0.5">{c.detail}</p>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        <hr className="divider" />

                                        {/* Recommendations */}
                                        {report.recommendations && report.recommendations.length > 0 && (
                                            <div className="report-section">
                                                <h2>📌 คำแนะนำเชิงกลยุทธ์</h2>
                                                <ul>
                                                    {report.recommendations.map((r, i) => (
                                                        <li key={i}><strong>{r}</strong></li>
                                                    ))}
                                                </ul>
                                            </div>
                                        )}

                                        {/* Risk Flags */}
                                        {report.riskFlags && report.riskFlags.length > 0 && (
                                            <div className="report-section bg-amber-50 border border-amber-100 rounded-2xl p-4">
                                                <h2 style={{color:'#92400e'}}>⚠️ จุดที่ต้องเฝ้าระวัง</h2>
                                                <ul>
                                                    {report.riskFlags.map((f, i) => (
                                                        <li key={i} style={{color:'#78350f'}}>{f}</li>
                                                    ))}
                                                </ul>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ─── Main App ──────────────────────────────────────────────────────────────
        const App = () => {
            const [data, setData] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');
            const [sortConfig, setSortConfig] = useState({ key: 'lastDateObj', direction: 'desc' });
            const [isProcessing, setIsProcessing] = useState(false);
            const [error, setError] = useState(null);
            const fileInputRef = useRef(null);

            const keywords = ['peptide', 'เปปไทด์', 'mounjaro', 'mouajaro', 'มอนจาโร', 'slimnow', 'สลิมนาว', 'คุมหิว', 'ปากกา', 'ลดน้ำหนัก'];

            const parseDate = (dateStr) => {
                if (!dateStr) return new Date(0);
                if (typeof dateStr === 'number') return new Date((dateStr - 25569) * 86400 * 1000);
                const parts = String(dateStr).split('/');
                if (parts.length === 3) return new Date(parts[2], parts[1] - 1, parts[0]);
                const isoDate = new Date(dateStr);
                return isNaN(isoDate.getTime()) ? new Date(0) : isoDate;
            };

            const handleFileUpload = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                setIsProcessing(true);
                setError(null);
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const bstr = e.target.result;
                        const workbook = XLSX.read(bstr, { type: 'binary' });
                        const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                        const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                        processRawData(rows);
                    } catch (err) {
                        setError("ไม่สามารถประมวลผลไฟล์ได้ กรุณาตรวจสอบรูปแบบไฟล์ Excel");
                        setIsProcessing(false);
                    }
                };
                reader.readAsBinaryString(file);
                event.target.value = '';
            };

            const processRawData = (rows) => {
                if (rows.length < 2) { setError("ไม่พบข้อมูลในไฟล์"); setIsProcessing(false); return; }
                const headers = rows[0].map(h => String(h).trim());
                const findIdx = (names) => headers.findIndex(h => names.some(n => h.includes(n)));
                const idx = {
                    hn: findIdx(['HN', 'รหัสคนไข้']),
                    name: findIdx(['ชื่อ-สกุล', 'ชื่อ', 'Name']),
                    item: findIdx(['รายการ', 'ชื่อสินค้า', 'Product']),
                    date: findIdx(['วันที่ขาย', 'วันที่บริการ', 'Date']),
                    regDate: findIdx(['วันลงทะเบียน', 'วันที่ลงทะเบียน', 'Registration Date']),
                    paid: findIdx(['ยอดชำระ', 'ยอดเงิน', 'Paid']),
                    qty: findIdx(['จำนวน', 'ครั้ง', 'Qty', 'Amount'])
                };
                const grouped = {};
                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (!row || !row[idx.hn]) continue;
                    const itemName = String(row[idx.item] || "");
                    const lowerItem = itemName.toLowerCase();
                    const isMounjaroTarget = lowerItem.includes('mounjaro') || lowerItem.includes('mouajaro') || lowerItem.includes('มอนจาโร');
                    const isAnyTarget = keywords.some(k => lowerItem.includes(k.toLowerCase()));
                    if (isAnyTarget) {
                        const hn = String(row[idx.hn]).trim();
                        const qty = parseInt(row[idx.qty]) || 0;
                        const paid = parseFloat(String(row[idx.paid] || "0").replace(/,/g, '')) || 0;
                        const serviceDate = parseDate(row[idx.date]);
                        const regDate = parseDate(row[idx.regDate]);
                        if (!grouped[hn]) {
                            grouped[hn] = { hn, name: String(row[idx.name] || "-"), items: [], registrationDate: regDate, lastDateObj: serviceDate, totalPaid: 0, mounjaroInjections: 0, mounjaroPaid: 0, mounjaroDates: [], totalQty: 0, count: 0, hasMounjaro: false };
                        }
                        if (isMounjaroTarget) {
                            grouped[hn].hasMounjaro = true;
                            grouped[hn].mounjaroPaid += paid;
                            if (lowerItem.includes('[ตัดคอร์ส]')) {
                                grouped[hn].mounjaroInjections += qty;
                                grouped[hn].mounjaroDates.push({ dateObj: serviceDate, dateStr: serviceDate.toLocaleDateString('th-TH'), qty });
                            }
                        }
                        if (!grouped[hn].items.includes(itemName)) grouped[hn].items.push(itemName);
                        grouped[hn].totalPaid += paid;
                        grouped[hn].totalQty += qty;
                        grouped[hn].count += 1;
                        if (serviceDate > grouped[hn].lastDateObj) grouped[hn].lastDateObj = serviceDate;
                    }
                }
                Object.values(grouped).forEach(c => c.mounjaroDates.sort((a, b) => b.dateObj - a.dateObj));
                setData(Object.values(grouped));
                setIsProcessing(false);
            };

            const handleSort = (key) => {
                let direction = 'desc';
                if (sortConfig.key === key && sortConfig.direction === 'desc') direction = 'asc';
                setSortConfig({ key, direction });
            };

            const filteredData = useMemo(() => {
                const start = startDate ? new Date(startDate) : null;
                const end = endDate ? new Date(endDate) : null;
                if (start) start.setHours(0,0,0,0);
                if (end) end.setHours(23,59,59,999);
                let result = data.filter(item => {
                    const matchesSearch = item.name.toLowerCase().includes(searchTerm.toLowerCase()) || item.hn.includes(searchTerm);
                    let matchesDate = true;
                    if (start) matchesDate = matchesDate && item.lastDateObj >= start;
                    if (end) matchesDate = matchesDate && item.lastDateObj <= end;
                    return matchesSearch && matchesDate;
                });
                result = result.map(item => {
                    let status = "เก่า";
                    if (start && end) { if (item.registrationDate >= start && item.registrationDate <= end) status = "ใหม่"; }
                    else if (start) { if (item.registrationDate >= start) status = "ใหม่"; }
                    return { ...item, customerStatus: status };
                });
                result.sort((a, b) => {
                    let valA = a[sortConfig.key], valB = b[sortConfig.key];
                    if (typeof valA === 'string' && sortConfig.key === 'name') return sortConfig.direction === 'asc' ? valA.localeCompare(valB, 'th') : valB.localeCompare(valA, 'th');
                    if (valA < valB) return sortConfig.direction === 'asc' ? -1 : 1;
                    if (valA > valB) return sortConfig.direction === 'asc' ? 1 : -1;
                    return 0;
                });
                return result;
            }, [data, searchTerm, startDate, endDate, sortConfig]);

            const stats = useMemo(() => {
                return filteredData.reduce((acc, curr) => {
                    acc.revenue += curr.totalPaid;
                    acc.mounjaroInjections += curr.mounjaroInjections;
                    acc.mounjaroRevenue += curr.mounjaroPaid;
                    if (curr.customerStatus === 'ใหม่') acc.newCount += 1; else acc.oldCount += 1;
                    if (curr.totalPaid > 0) acc.buyingCustomers += 1;
                    if (curr.mounjaroInjections > 0) acc.injectionCustomers += 1;
                    if (curr.hasMounjaro) acc.mounjaroUniqueCustomers += 1;
                    return acc;
                }, { revenue: 0, mounjaroInjections: 0, mounjaroRevenue: 0, newCount: 0, oldCount: 0, buyingCustomers: 0, injectionCustomers: 0, mounjaroUniqueCustomers: 0 });
            }, [filteredData]);

            const handleReset = () => { setData([]); setSearchTerm(''); setStartDate(''); setEndDate(''); setSortConfig({ key: 'lastDateObj', direction: 'desc' }); setError(null); };

            const getSortIcon = (key) => {
                if (sortConfig.key !== key) return <Icon name="arrowUpDown" size={12} className="text-slate-300 ml-1 opacity-50" />;
                return sortConfig.direction === 'asc' ? <Icon name="arrowUp" size={12} className="text-blue-600 ml-1" /> : <Icon name="arrowDown" size={12} className="text-blue-600 ml-1" />;
            };

            const handleExport = () => {
                if (filteredData.length === 0) return;
                const exportRows = filteredData.map((item, index) => ({
                    "ลำดับ": index + 1, "HN": item.hn, "ชื่อ-สกุล": item.name,
                    "ประเภทลูกค้า": item.customerStatus === "ใหม่" ? "ลูกค้าใหม่" : "ลูกค้าเก่า",
                    "จำนวนฉีด Mounjaro": item.mounjaroInjections, "ยอดซื้อเฉพาะ Mounjaro": item.mounjaroPaid,
                    "บริการล่าสุด": item.lastDateObj.toLocaleDateString('th-TH'),
                    "ประวัติวันที่ฉีด": item.mounjaroDates.map(d => `${d.dateStr} (${d.qty})`).join(', '),
                    "ยอดซื้อรวมทั้งหมด": item.totalPaid
                }));
                const ws = XLSX.utils.json_to_sheet(exportRows);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Injection Detail Report");
                XLSX.writeFile(wb, `Mounjaro_History_${new Date().toISOString().split('T')[0]}.xlsx`);
            };

            return (
                <div className="min-h-screen pb-20">
                    <div className="max-w-7xl mx-auto px-4 py-8">
                        {/* Header */}
                        <header className="flex flex-col md:flex-row justify-between items-end gap-6 mb-10">
                            <div>
                                <h1 className="text-4xl font-black text-slate-900 tracking-tight">Injection <span className="text-blue-600">History</span></h1>
                                <p className="text-slate-500 mt-2 font-medium italic underline decoration-blue-200 decoration-2">ระบบวิเคราะห์ข้อมูลลูกค้า Mounjaro แบบครบวงจร</p>
                            </div>
                            <div className="flex flex-wrap justify-end gap-3">
                                <button onClick={handleReset} className="flex items-center gap-2 bg-white border border-rose-100 text-rose-500 px-6 py-3 rounded-2xl shadow-sm font-bold hover:bg-rose-50 transition-all">
                                    <Icon name="refresh" size={18} /> รีเฟรช
                                </button>
                                <button onClick={handleExport} disabled={filteredData.length === 0} className="flex items-center gap-2 bg-emerald-600 text-white px-6 py-3 rounded-2xl shadow-lg shadow-emerald-200 font-bold hover:bg-emerald-700 disabled:opacity-50 transition-all">
                                    <Icon name="download" /> Export XLSX
                                </button>
                                <button onClick={() => fileInputRef.current.click()} className="flex items-center gap-2 bg-white border border-slate-200 px-6 py-3 rounded-2xl shadow-sm font-bold hover:bg-slate-50 transition-all">
                                    <Icon name="upload" className="text-blue-600" /> อัปโหลด
                                </button>
                                <input type="file" ref={fileInputRef} className="hidden" onChange={handleFileUpload} accept=".xlsx,.xls,.csv" />
                            </div>
                        </header>

                        {/* Stats Group 1 */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                            <div className="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm flex items-center gap-5">
                                <div className="p-4 bg-blue-50 text-blue-600 rounded-3xl"><Icon name="dollar" size={32} /></div>
                                <div>
                                    <span className="text-[10px] font-black uppercase text-slate-400 tracking-widest block">ยอดขายรวมกลุ่มเป้าหมาย</span>
                                    <h3 className="text-3xl font-black text-slate-900">{stats.revenue.toLocaleString()} <span className="text-sm font-bold text-slate-400">บาท</span></h3>
                                </div>
                            </div>
                            <div className="bg-white p-6 rounded-[2rem] border border-blue-200 shadow-md bg-gradient-to-br from-white to-blue-50/30 flex items-center gap-5">
                                <div className="p-4 bg-blue-600 text-white rounded-3xl"><Icon name="syringe" size={32} /></div>
                                <div className="flex-1">
                                    <div className="flex justify-between items-start">
                                        <span className="text-[10px] font-black uppercase text-blue-600 tracking-widest block">ฉีด Mounjaro ทั้งหมด</span>
                                        <div className="text-right">
                                            <span className="text-[10px] font-black uppercase text-emerald-600 block">ยอดขาย Mounjaro</span>
                                            <span className="text-sm font-black text-emerald-600 tracking-tighter">฿{stats.mounjaroRevenue.toLocaleString()}</span>
                                        </div>
                                    </div>
                                    <h3 className="text-3xl font-black text-blue-600">{stats.mounjaroInjections.toLocaleString()} <span className="text-sm font-bold">ครั้ง</span></h3>
                                </div>
                            </div>
                        </div>

                        {/* Stats Group 2 */}
                        <div className="grid grid-cols-2 md:grid-cols-6 gap-3 mb-8">
                            <div className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm">
                                <div className="flex justify-between items-start mb-2"><span className="text-[9px] font-black uppercase text-slate-400">ลูกค้าทั้งหมด</span><Icon name="users" size={14} className="text-slate-300" /></div>
                                <h4 className="text-lg font-black text-slate-900">{filteredData.length} <span className="text-[9px] font-bold text-slate-400 uppercase">HN</span></h4>
                            </div>
                            <div className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm border-t-4 border-t-blue-600">
                                <div className="flex justify-between items-start mb-2"><span className="text-[9px] font-black uppercase text-blue-600">ลูกค้า Mounjaro</span></div>
                                <h4 className="text-lg font-black text-slate-900">{stats.mounjaroUniqueCustomers} <span className="text-[9px] font-bold text-slate-400 uppercase">HN</span></h4>
                            </div>
                            <div className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm border-t-4 border-t-emerald-500">
                                <div className="flex justify-between items-start mb-2"><span className="text-[9px] font-black uppercase text-emerald-500">ที่มีการซื้อ</span><Icon name="shopping" size={14} className="text-emerald-300" /></div>
                                <h4 className="text-lg font-black text-slate-900">{stats.buyingCustomers} <span className="text-[9px] font-bold text-slate-400 uppercase">HN</span></h4>
                            </div>
                            <div className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm border-t-4 border-t-purple-500">
                                <div className="flex justify-between items-start mb-2"><span className="text-[9px] font-black uppercase text-purple-500">ที่ฉีดจริง</span><Icon name="syringe" size={14} className="text-purple-300" /></div>
                                <h4 className="text-lg font-black text-slate-900">{stats.injectionCustomers} <span className="text-[10px] font-bold text-slate-400 uppercase leading-none">HN</span></h4>
                            </div>
                            <div className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm border-t-4 border-t-blue-400">
                                <div className="flex justify-between items-start mb-2"><span className="text-[9px] font-black uppercase text-blue-400">ลูกค้าใหม่</span><Icon name="user" size={14} className="text-blue-200" /></div>
                                <h4 className="text-lg font-black text-slate-900">{stats.newCount} <span className="text-[9px] font-bold text-slate-400 uppercase">HN</span></h4>
                            </div>
                            <div className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm border-t-4 border-t-slate-300">
                                <div className="flex justify-between items-start mb-2"><span className="text-[9px] font-black uppercase text-slate-400">ลูกค้าเก่า</span><Icon name="user" size={14} className="text-slate-200" /></div>
                                <h4 className="text-lg font-black text-slate-900">{stats.oldCount} <span className="text-[9px] font-bold text-slate-400 uppercase">HN</span></h4>
                            </div>
                        </div>

                        {/* Filters */}
                        <div className="bg-white rounded-[2rem] border border-slate-200 p-6 mb-8 grid grid-cols-1 md:grid-cols-3 gap-4 shadow-sm">
                            <div className="relative">
                                <Icon name="calendar" className="absolute left-4 top-3.5 text-slate-400" size={16} />
                                <input type="date" className="w-full bg-slate-50 px-12 py-3 rounded-xl outline-none text-sm font-bold border-none" value={startDate} onChange={e => setStartDate(e.target.value)} />
                                <span className="absolute -top-2 left-4 bg-white px-1 text-[10px] font-bold text-blue-600 uppercase tracking-tighter leading-none">บริการล่าสุดเริ่มจาก</span>
                            </div>
                            <div className="relative">
                                <Icon name="calendar" className="absolute left-4 top-3.5 text-slate-400" size={16} />
                                <input type="date" className="w-full bg-slate-50 px-12 py-3 rounded-xl outline-none text-sm font-bold border-none" value={endDate} onChange={e => setEndDate(e.target.value)} />
                                <span className="absolute -top-2 left-4 bg-white px-1 text-[10px] font-bold text-blue-600 uppercase tracking-tighter leading-none">ถึงวันที่</span>
                            </div>
                            <div className="relative">
                                <Icon name="search" className="absolute left-4 top-3.5 text-slate-400" size={18} />
                                <input type="text" placeholder="ค้นชื่อ หรือ HN..." className="w-full bg-slate-50 pl-12 pr-4 py-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-sm font-bold transition-all" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                                <span className="absolute -top-2 left-4 bg-white px-1 text-[10px] font-bold text-slate-400 uppercase tracking-tighter leading-none">ค้นหาข้อมูล</span>
                            </div>
                        </div>

                        {error && (
                            <div className="mb-8 p-4 bg-rose-50 border-l-4 border-rose-500 text-rose-700 flex items-center gap-3 rounded-r-xl">
                                <Icon name="x" className="text-rose-500" /><p className="font-bold text-sm">{error}</p>
                            </div>
                        )}

                        {/* ── AI Summary Button + Panel ── */}
                        <AISummaryPanel
                            stats={stats}
                            filteredData={filteredData}
                            startDate={startDate}
                            endDate={endDate}
                        />

                        {/* Table */}
                        <div className="bg-white rounded-[2.5rem] shadow-xl border border-slate-100 overflow-hidden">
                            <div className="overflow-x-auto custom-scrollbar">
                                <table className="w-full text-left border-collapse">
                                    <thead className="bg-slate-50/80 text-[10px] uppercase font-black text-slate-400 tracking-widest border-b border-slate-100">
                                        <tr>
                                            <th className="px-8 py-5">#</th>
                                            <th className="px-8 py-5 sort-header" onClick={() => handleSort('name')}><div className="flex items-center">ลูกค้า (HN) {getSortIcon('name')}</div></th>
                                            <th className="px-8 py-5 text-center sort-header" onClick={() => handleSort('customerStatus')}><div className="flex items-center justify-center">ประเภท {getSortIcon('customerStatus')}</div></th>
                                            <th className="px-8 py-5 text-center sort-header" onClick={() => handleSort('mounjaroInjections')}><div className="flex items-center justify-center">ฉีด Mounjaro {getSortIcon('mounjaroInjections')}</div></th>
                                            <th className="px-8 py-5 text-center sort-header" onClick={() => handleSort('lastDateObj')}><div className="flex items-center justify-center text-blue-600 font-black">บริการล่าสุด {getSortIcon('lastDateObj')}</div></th>
                                            <th className="px-8 py-5">รายการสินค้าอื่น</th>
                                            <th className="px-8 py-5 text-right sort-header" onClick={() => handleSort('totalPaid')}><div className="flex items-center justify-end">ยอดซื้อรวม {getSortIcon('totalPaid')}</div></th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-50">
                                        {filteredData.length > 0 ? filteredData.map((row, i) => (
                                            <tr key={row.hn} className="hover:bg-blue-50/40 transition-colors group">
                                                <td className="px-8 py-6 text-slate-300 font-bold">{i+1}</td>
                                                <td className="px-8 py-6">
                                                    <p className="font-bold text-slate-900 group-hover:text-blue-600 transition-colors leading-tight">{row.name}</p>
                                                    <p className="text-[10px] text-slate-400 font-bold tracking-tighter uppercase mt-0.5">HN: {row.hn}</p>
                                                </td>
                                                <td className="px-8 py-6 text-center">
                                                    <span className={`px-3 py-1 rounded-full text-[10px] font-black border tracking-tighter ${row.customerStatus === 'ใหม่' ? 'bg-emerald-50 text-emerald-600 border-emerald-100' : 'bg-slate-50 text-slate-400 border-slate-100'}`}>
                                                        {row.customerStatus === 'ใหม่' ? 'ลูกค้าใหม่' : 'ลูกค้าเก่า'}
                                                    </span>
                                                </td>
                                                <td className="px-8 py-6">
                                                    <div className="flex flex-col items-center">
                                                        <span className={`text-base font-black px-6 py-2 rounded-2xl mb-3 shadow-sm ${row.mounjaroInjections > 0 ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-300'}`}>
                                                            {row.mounjaroInjections} ครั้ง
                                                        </span>
                                                        {row.mounjaroDates && row.mounjaroDates.length > 0 && (
                                                            <div className="flex flex-col gap-1.5 w-full max-w-[140px]">
                                                                {row.mounjaroDates.map((d, idx) => (
                                                                    <div key={idx} className="flex justify-between items-center text-[10px] text-blue-700 bg-blue-50 px-2.5 py-1 rounded-lg border border-blue-100 font-bold">
                                                                        <span>{d.dateStr}</span>
                                                                        <span className="bg-blue-600 text-white px-1.5 rounded-full text-[8px]">{d.qty}</span>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        )}
                                                    </div>
                                                </td>
                                                <td className="px-8 py-6 text-center">
                                                    <div className="bg-blue-50/50 p-2 rounded-xl border border-blue-100/50 inline-block min-w-[100px]">
                                                        <p className="text-sm font-black text-blue-700">{row.lastDateObj.toLocaleDateString('th-TH')}</p>
                                                        <p className="text-[9px] text-blue-400 font-bold uppercase tracking-tighter italic leading-none mt-1">LATEST SERVICE</p>
                                                    </div>
                                                </td>
                                                <td className="px-8 py-6">
                                                    <div className="flex flex-wrap gap-1 max-w-[180px]">
                                                        {row.items.map((it, idx) => (
                                                            <span key={idx} className={`text-[9px] px-2 py-0.5 rounded-lg border leading-relaxed ${it.includes('[ตัดคอร์ส]') ? 'bg-blue-100 text-blue-700 border-blue-200 font-bold' : 'bg-slate-50 text-slate-400 border-slate-100'}`}>
                                                                {it}
                                                            </span>
                                                        ))}
                                                    </div>
                                                </td>
                                                <td className="px-8 py-6 text-right">
                                                    <p className="text-xl font-black text-slate-900 tracking-tighter leading-none">{row.totalPaid.toLocaleString()}</p>
                                                    <p className="text-[9px] text-slate-400 font-bold uppercase mt-1 tracking-widest">{row.count} ITEMS</p>
                                                </td>
                                            </tr>
                                        )) : (
                                            <tr>
                                                <td colSpan="7" className="py-32 text-center opacity-30 font-bold italic">ไม่พบข้อมูล... กรุณาอัปโหลดไฟล์</td>
                                            </tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
