<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mounjaro Injection Tracking - Summary Dashboard Pro</title>
    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Sarabun', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .sort-header { cursor: pointer; user-select: none; transition: background-color 0.2s; }
        .sort-header:hover { background-color: #f1f5f9; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useRef, useEffect } = React;

        // SVG Icon Components
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                upload: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4m14-7-5-5-5 5m5-5v12"/>,
                download: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4m-7-11v12m-4-4 4 4 4-4"/>,
                search: <><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></>,
                calendar: <><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></>,
                filter: <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>,
                user: <><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>,
                users: <><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
                dollar: <><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></>,
                syringe: <><path d="m18 2 4 4"/><path d="m17 7 3-3"/><path d="M19 9 8.7 19.3c-.7.7-1.6 1.2-2.6 1.5l-4.1.9.9-4.1c.3-1 1.2-1.9 1.5-2.6L14.7 4.7"/><path d="m18 5 3 3"/><path d="m14 10 4 4"/></>,
                trending: <><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><path d="M17 6h6v6"/></>,
                refresh: <><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></>,
                shopping: <><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></>,
                x: <path d="M18 6 6 18M6 6l12 12"/>,
                arrowUp: <path d="m18 15-6-6-6 6"/>,
                arrowDown: <path d="m6 9 6 6 6-6"/>,
                arrowUpDown: <><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const [data, setData] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');
            const [sortConfig, setSortConfig] = useState({ key: 'lastDateObj', direction: 'desc' });
            const [isProcessing, setIsProcessing] = useState(false);
            const [error, setError] = useState(null);
            const fileInputRef = useRef(null);

            const keywords = ['peptide', 'เปปไทด์', 'mounjaro', 'mouajaro', 'มอนจาโร', 'slimnow', 'สลิมนาว', 'คุมหิว', 'ปากกา', 'ลดน้ำหนัก'];

            const parseDate = (dateStr) => {
                if (!dateStr) return new Date(0);
                if (typeof dateStr === 'number') return new Date((dateStr - 25569) * 86400 * 1000);
                const parts = String(dateStr).split('/');
                if (parts.length === 3) return new Date(parts[2], parts[1] - 1, parts[0]);
                const isoDate = new Date(dateStr);
                return isNaN(isoDate.getTime()) ? new Date(0) : isoDate;
            };

            const handleFileUpload = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                setIsProcessing(true);
                setError(null);

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const bstr = e.target.result;
                        const workbook = XLSX.read(bstr, { type: 'binary' });
                        const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                        const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                        processRawData(rows);
                    } catch (err) {
                        setError("ไม่สามารถประมวลผลไฟล์ได้ กรุณาตรวจสอบรูปแบบไฟล์ Excel");
                        setIsProcessing(false);
                    }
                };
                reader.readAsBinaryString(file);
                event.target.value = '';
            };

            const processRawData = (rows) => {
                if (rows.length < 2) { setError("ไม่พบข้อมูลในไฟล์"); setIsProcessing(false); return; }
                const headers = rows[0].map(h => String(h).trim());
                const findIdx = (names) => headers.findIndex(h => names.some(n => h.includes(n)));

                const idx = {
                    hn: findIdx(['HN', 'รหัสคนไข้']),
                    name: findIdx(['ชื่อ-สกุล', 'ชื่อ', 'Name']),
                    item: findIdx(['รายการ', 'ชื่อสินค้า', 'Product']),
                    date: findIdx(['วันที่ขาย', 'วันที่บริการ', 'Date']),
                    regDate: findIdx(['วันลงทะเบียน', 'วันที่ลงทะเบียน', 'Registration Date']),
                    paid: findIdx(['ยอดชำระ', 'ยอดเงิน', 'Paid']),
                    qty: findIdx(['จำนวน', 'ครั้ง', 'Qty', 'Amount'])
                };

                const grouped = {};
                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (!row || !row[idx.hn]) continue;

                    const itemName = String(row[idx.item] || "");
                    const lowerItem = itemName.toLowerCase();
                    
                    const isMounjaroTarget = lowerItem.includes('mounjaro') || lowerItem.includes('mouajaro') || lowerItem.includes('มอนจาโร');
                    const isAnyTarget = keywords.some(k => lowerItem.includes(k.toLowerCase()));

                    if (isAnyTarget) {
                        const hn = String(row[idx.hn]).trim();
                        const qty = parseInt(row[idx.qty]) || 0;
                        const paid = parseFloat(String(row[idx.paid] || "0").replace(/,/g, '')) || 0;
                        const serviceDate = parseDate(row[idx.date]);
                        const regDate = parseDate(row[idx.regDate]);

                        if (!grouped[hn]) {
                            grouped[hn] = {
                                hn,
                                name: String(row[idx.name] || "-"),
                                items: [],
                                registrationDate: regDate,
                                lastDateObj: serviceDate,
                                totalPaid: 0,
                                mounjaroInjections: 0,
                                mounjaroDates: [],
                                totalQty: 0,
                                count: 0,
                                hasMounjaro: false
                            };
                        }

                        if (isMounjaroTarget) {
                            grouped[hn].hasMounjaro = true;
                            if (lowerItem.includes('[ตัดคอร์ส]')) {
                                grouped[hn].mounjaroInjections += qty;
                                grouped[hn].mounjaroDates.push({
                                    dateObj: serviceDate,
                                    dateStr: serviceDate.toLocaleDateString('th-TH'),
                                    qty: qty
                                });
                            }
                        }

                        if (!grouped[hn].items.includes(itemName)) grouped[hn].items.push(itemName);
                        grouped[hn].totalPaid += paid;
                        grouped[hn].totalQty += qty;
                        grouped[hn].count += 1;
                        if (serviceDate > grouped[hn].lastDateObj) grouped[hn].lastDateObj = serviceDate;
                    }
                }

                Object.values(grouped).forEach(customer => {
                    customer.mounjaroDates.sort((a, b) => b.dateObj - a.dateObj);
                });

                setData(Object.values(grouped));
                setIsProcessing(false);
            };

            const handleSort = (key) => {
                let direction = 'desc';
                if (sortConfig.key === key && sortConfig.direction === 'desc') {
                    direction = 'asc';
                }
                setSortConfig({ key, direction });
            };

            const filteredData = useMemo(() => {
                const start = startDate ? new Date(startDate) : null;
                const end = endDate ? new Date(endDate) : null;
                if (start) start.setHours(0,0,0,0);
                if (end) end.setHours(23,59,59,999);

                let result = data.filter(item => {
                    const matchesSearch = item.name.toLowerCase().includes(searchTerm.toLowerCase()) || item.hn.includes(searchTerm);
                    let matchesDate = true;
                    if (start) matchesDate = matchesDate && item.lastDateObj >= start;
                    if (end) matchesDate = matchesDate && item.lastDateObj <= end;
                    return matchesSearch && matchesDate;
                });

                result = result.map(item => {
                    let status = "เก่า";
                    if (start && end) {
                        if (item.registrationDate >= start && item.registrationDate <= end) status = "ใหม่";
                    } else if (start) {
                        if (item.registrationDate >= start) status = "ใหม่";
                    }
                    return { ...item, customerStatus: status };
                });

                // Dynamic Sorting logic
                result.sort((a, b) => {
                    let valA = a[sortConfig.key];
                    let valB = b[sortConfig.key];

                    if (typeof valA === 'string' && sortConfig.key === 'name') {
                        return sortConfig.direction === 'asc' 
                            ? valA.localeCompare(valB, 'th') 
                            : valB.localeCompare(valA, 'th');
                    }

                    if (valA < valB) return sortConfig.direction === 'asc' ? -1 : 1;
                    if (valA > valB) return sortConfig.direction === 'asc' ? 1 : -1;
                    return 0;
                });

                return result;
            }, [data, searchTerm, startDate, endDate, sortConfig]);

            const stats = useMemo(() => {
                return filteredData.reduce((acc, curr) => {
                    acc.revenue += curr.totalPaid;
                    acc.mounjaroInjections += curr.mounjaroInjections;
                    if (curr.customerStatus === 'ใหม่') acc.newCount += 1;
                    else acc.oldCount += 1;
                    if (curr.totalPaid > 0) acc.buyingCustomers += 1;
                    if (curr.mounjaroInjections > 0) acc.injectionCustomers += 1;
                    if (curr.hasMounjaro) acc.mounjaroUniqueCustomers += 1;
                    return acc;
                }, { revenue: 0, mounjaroInjections: 0, newCount: 0, oldCount: 0, buyingCustomers: 0, injectionCustomers: 0, mounjaroUniqueCustomers: 0 });
            }, [filteredData]);

            const handleReset = () => {
                setData([]);
                setSearchTerm('');
                setStartDate('');
                setEndDate('');
                setSortConfig({ key: 'lastDateObj', direction: 'desc' });
                setError(null);
            };

            const getSortIcon = (key) => {
                if (sortConfig.key !== key) return <Icon name="arrowUpDown" size={12} className="text-slate-300 ml-1 opacity-50" />;
                return sortConfig.direction === 'asc' 
                    ? <Icon name="arrowUp" size={12} className="text-blue-600 ml-1" /> 
                    : <Icon name="arrowDown" size={12} className="text-blue-600 ml-1" />;
            };

            const handleExport = () => {
                if (filteredData.length === 0) return;
                const exportRows = filteredData.map((item, index) => ({
                    "ลำดับ": index + 1,
                    "HN": item.hn,
                    "ชื่อ-สกุล": item.name,
                    "สถานะ": item.customerStatus === "ใหม่" ? "ลูกค้าใหม่" : "ลูกค้าเก่า",
                    "วันลงทะเบียน": item.registrationDate.toLocaleDateString('th-TH'),
                    "จำนวนฉีด Mounjaro": item.mounjaroInjections,
                    "ประวัติวันที่ฉีด": item.mounjaroDates.map(d => `${d.dateStr} (${d.qty})`).join(', '),
                    "ยอดซื้อรวม": item.totalPaid,
                    "บริการล่าสุด": item.lastDateObj.toLocaleDateString('th-TH')
                }));
                const ws = XLSX.utils.json_to_sheet(exportRows);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Injection Detail Report");
                XLSX.writeFile(wb, `Mounjaro_History_${new Date().toISOString().split('T')[0]}.xlsx`);
            };

            return (
                <div className="min-h-screen pb-20">
                    <div className="max-w-7xl mx-auto px-4 py-8">
                        {/* Header */}
                        <header className="flex flex-col md:flex-row justify-between items-end gap-6 mb-10">
                            <div>
                                <h1 className="text-4xl font-black text-slate-900 tracking-tight">Injection <span className="text-blue-600">History</span></h1>
                                <p className="text-slate-500 mt-2 font-medium italic underline decoration-blue-200 decoration-2">ระบบวิเคราะห์ข้อมูลลูกค้า Mounjaro แบบครบวงจร</p>
                            </div>
                            <div className="flex flex-wrap justify-end gap-3">
                                <button onClick={handleReset} className="flex items-center gap-2 bg-white border border-rose-100 text-rose-500 px-6 py-3 rounded-2xl shadow-sm font-bold hover:bg-rose-50 transition-all">
                                    <Icon name="refresh" size={18} /> รีเฟรช
                                </button>
                                <button onClick={handleExport} disabled={filteredData.length === 0} className="flex items-center gap-2 bg-emerald-600 text-white px-6 py-3 rounded-2xl shadow-lg shadow-emerald-200 font-bold hover:bg-emerald-700 disabled:opacity-50 transition-all">
                                    <Icon name="download" /> Export XLSX
                                </button>
                                <button onClick={() => fileInputRef.current.click()} className="flex items-center gap-2 bg-white border border-slate-200 px-6 py-3 rounded-2xl shadow-sm font-bold hover:bg-slate-50 transition-all">
                                    <Icon name="upload" className="text-blue-600" /> อัปโหลด
                                </button>
                                <input type="file" ref={fileInputRef} className="hidden" onChange={handleFileUpload} accept=".xlsx,.xls,.csv" />
                            </div>
                        </header>

                        {/* Stats Group 1: Revenue & Injections */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                            <div className="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm flex items-center gap-5">
                                <div className="p-4 bg-blue-50 text-blue-600 rounded-3xl"><Icon name="dollar" size={32} /></div>
                                <div>
                                    <span className="text-[10px] font-black uppercase text-slate-400 tracking-widest block">ยอดขายรวมกลุ่มเป้าหมาย</span>
                                    <h3 className="text-3xl font-black text-slate-900">{stats.revenue.toLocaleString()} <span className="text-sm font-bold text-slate-400">บาท</span></h3>
                                </div>
                            </div>
                            <div className="bg-white p-6 rounded-[2rem] border border-blue-200 shadow-md bg-gradient-to-br from-white to-blue-50/30 flex items-center gap-5">
                                <div className="p-4 bg-blue-600 text-white rounded-3xl"><Icon name="syringe" size={32} /></div>
                                <div>
                                    <span className="text-[10px] font-black uppercase text-blue-600 tracking-widest block">จำนวนฉีด Mounjaro ทั้งหมด</span>
                                    <h3 className="text-3xl font-black text-blue-600">{stats.mounjaroInjections.toLocaleString()} <span className="text-sm font-bold">ครั้ง</span></h3>
                                </div>
                            </div>
                        </div>

                        {/* Stats Group 2: Unique Customer Cards */}
                        <div className="grid grid-cols-2 md:grid-cols-6 gap-3 mb-8">
                            <div className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm">
                                <div className="flex justify-between items-start mb-2">
                                    <span className="text-[9px] font-black uppercase text-slate-400">ลูกค้าทั้งหมด</span>
                                    <Icon name="users" size={14} className="text-slate-300" />
                                </div>
                                <h4 className="text-lg font-black text-slate-900">{filteredData.length} <span className="text-[9px] font-bold text-slate-400 uppercase">HN</span></h4>
                            </div>
                            <div className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm border-t-4 border-t-blue-600">
                                <div className="flex justify-between items-start mb-2">
                                    <span className="text-[9px] font-black uppercase text-blue-600">ลูกค้า Mounjaro</span>
                                    <Icon name="activity" size={14} className="text-blue-300" />
                                </div>
                                <h4 className="text-lg font-black text-slate-900">{stats.mounjaroUniqueCustomers} <span className="text-[9px] font-bold text-slate-400 uppercase">HN</span></h4>
                            </div>
                            <div className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm border-t-4 border-t-emerald-500">
                                <div className="flex justify-between items-start mb-2">
                                    <span className="text-[9px] font-black uppercase text-emerald-500">ที่มีการซื้อ</span>
                                    <Icon name="shopping" size={14} className="text-emerald-300" />
                                </div>
                                <h4 className="text-lg font-black text-slate-900">{stats.buyingCustomers} <span className="text-[9px] font-bold text-slate-400 uppercase">HN</span></h4>
                            </div>
                            <div className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm border-t-4 border-t-purple-500">
                                <div className="flex justify-between items-start mb-2">
                                    <span className="text-[9px] font-black uppercase text-purple-500">ที่ฉีดจริง</span>
                                    <Icon name="syringe" size={14} className="text-purple-300" />
                                </div>
                                <h4 className="text-lg font-black text-slate-900">{stats.injectionCustomers} <span className="text-[9px] font-bold text-slate-400 uppercase">HN</span></h4>
                            </div>
                            <div className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm border-t-4 border-t-blue-400">
                                <div className="flex justify-between items-start mb-2">
                                    <span className="text-[9px] font-black uppercase text-blue-400">ลูกค้าใหม่</span>
                                    <Icon name="user" size={14} className="text-blue-200" />
                                </div>
                                <h4 className="text-lg font-black text-slate-900">{stats.newCount} <span className="text-[9px] font-bold text-slate-400 uppercase">HN</span></h4>
                            </div>
                            <div className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm border-t-4 border-t-slate-300">
                                <div className="flex justify-between items-start mb-2">
                                    <span className="text-[9px] font-black uppercase text-slate-400">ลูกค้าเก่า</span>
                                    <Icon name="user" size={14} className="text-slate-200" />
                                </div>
                                <h4 className="text-lg font-black text-slate-900">{stats.oldCount} <span className="text-[9px] font-bold text-slate-400 uppercase">HN</span></h4>
                            </div>
                        </div>

                        {/* Filters */}
                        <div className="bg-white rounded-[2rem] border border-slate-200 p-6 mb-8 grid grid-cols-1 md:grid-cols-3 gap-4 shadow-sm">
                            <div className="relative">
                                <Icon name="search" className="absolute left-4 top-3.5 text-slate-400" size={18} />
                                <input type="text" placeholder="ค้นชื่อ หรือ HN..." className="w-full bg-slate-50 pl-12 pr-4 py-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-sm font-bold transition-all" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                            </div>
                            <div className="relative">
                                <input type="date" className="w-full bg-slate-50 px-4 py-3 rounded-xl outline-none text-sm font-bold border-none" value={startDate} onChange={e => setStartDate(e.target.value)} />
                                <span className="absolute -top-2 left-4 bg-white px-1 text-[10px] font-bold text-slate-400 uppercase">วันที่เริ่ม</span>
                            </div>
                            <div className="relative">
                                <input type="date" className="w-full bg-slate-50 px-4 py-3 rounded-xl outline-none text-sm font-bold border-none" value={endDate} onChange={e => setEndDate(e.target.value)} />
                                <span className="absolute -top-2 left-4 bg-white px-1 text-[10px] font-bold text-slate-400 uppercase">วันที่สิ้นสุด</span>
                            </div>
                        </div>

                        {error && (
                            <div className="mb-8 p-4 bg-rose-50 border-l-4 border-rose-500 text-rose-700 flex items-center gap-3 rounded-r-xl">
                                <Icon name="x" className="text-rose-500" />
                                <p className="font-bold text-sm">{error}</p>
                            </div>
                        )}

                        {/* Table */}
                        <div className="bg-white rounded-[2.5rem] shadow-xl border border-slate-100 overflow-hidden">
                            <div className="overflow-x-auto custom-scrollbar">
                                <table className="w-full text-left border-collapse">
                                    <thead className="bg-slate-50/80 text-[10px] uppercase font-black text-slate-400 tracking-widest border-b border-slate-100">
                                        <tr>
                                            <th className="px-8 py-5">#</th>
                                            <th className="px-8 py-5 sort-header" onClick={() => handleSort('name')}>
                                                <div className="flex items-center">ลูกค้า (HN) {getSortIcon('name')}</div>
                                            </th>
                                            <th className="px-8 py-5 text-center sort-header" onClick={() => handleSort('customerStatus')}>
                                                <div className="flex items-center justify-center">ประเภท {getSortIcon('customerStatus')}</div>
                                            </th>
                                            <th className="px-8 py-5 text-center sort-header" onClick={() => handleSort('mounjaroInjections')}>
                                                <div className="flex items-center justify-center">ฉีด Mounjaro {getSortIcon('mounjaroInjections')}</div>
                                            </th>
                                            <th className="px-8 py-5">รายการสินค้าอื่น</th>
                                            <th className="px-8 py-5 text-center sort-header" onClick={() => handleSort('registrationDate')}>
                                                <div className="flex items-center justify-center">ลงทะเบียน {getSortIcon('registrationDate')}</div>
                                            </th>
                                            <th className="px-8 py-5 text-right sort-header" onClick={() => handleSort('totalPaid')}>
                                                <div className="flex items-center justify-end">ยอดซื้อรวม {getSortIcon('totalPaid')}</div>
                                            </th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-50">
                                        {filteredData.length > 0 ? filteredData.map((row, i) => (
                                            <tr key={row.hn} className="hover:bg-blue-50/40 transition-colors group">
                                                <td className="px-8 py-6 text-slate-300 font-bold">{i+1}</td>
                                                <td className="px-8 py-6">
                                                    <p className="font-bold text-slate-900 group-hover:text-blue-600 transition-colors leading-tight">{row.name}</p>
                                                    <p className="text-[10px] text-slate-400 font-bold tracking-tighter uppercase mt-0.5">HN: {row.hn}</p>
                                                </td>
                                                <td className="px-8 py-6 text-center">
                                                    <span className={`px-3 py-1 rounded-full text-[10px] font-black border tracking-tighter ${
                                                        row.customerStatus === 'ใหม่' ? 'bg-emerald-50 text-emerald-600 border-emerald-100' : 'bg-slate-50 text-slate-400 border-slate-100'
                                                    }`}>
                                                        {row.customerStatus === 'ใหม่' ? 'ลูกค้าใหม่' : 'ลูกค้าเก่า'}
                                                    </span>
                                                </td>
                                                <td className="px-8 py-6">
                                                    <div className="flex flex-col items-center">
                                                        <span className={`text-base font-black px-6 py-2 rounded-2xl mb-3 shadow-sm ${row.mounjaroInjections > 0 ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-300'}`}>
                                                            {row.mounjaroInjections} ครั้ง
                                                        </span>
                                                        {row.mounjaroDates && row.mounjaroDates.length > 0 && (
                                                            <div className="flex flex-col gap-1.5 w-full max-w-[140px]">
                                                                {row.mounjaroDates.map((d, idx) => (
                                                                    <div key={idx} className="flex justify-between items-center text-[10px] text-blue-700 bg-blue-50 px-2.5 py-1 rounded-lg border border-blue-100 font-bold">
                                                                        <span>{d.dateStr}</span>
                                                                        <span className="bg-blue-600 text-white px-1.5 rounded-full text-[8px]">{d.qty}</span>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        )}
                                                    </div>
                                                </td>
                                                <td className="px-8 py-6">
                                                    <div className="flex flex-wrap gap-1 max-w-[180px]">
                                                        {row.items.map((it, idx) => (
                                                            <span key={idx} className={`text-[9px] px-2 py-0.5 rounded-lg border leading-relaxed ${
                                                                it.includes('[ตัดคอร์ส]') ? 'bg-blue-100 text-blue-700 border-blue-200 font-bold' : 'bg-slate-50 text-slate-400 border-slate-100'
                                                            }`}>
                                                                {it}
                                                            </span>
                                                        ))}
                                                    </div>
                                                </td>
                                                <td className="px-8 py-6 text-center">
                                                    <p className="text-sm font-bold text-slate-600">{row.registrationDate.toLocaleDateString('th-TH')}</p>
                                                    <p className="text-[10px] text-slate-400 italic font-bold uppercase tracking-tighter mt-1">
                                                        ล่าสุด: {row.lastDateObj.toLocaleDateString('th-TH')}
                                                    </p>
                                                </td>
                                                <td className="px-8 py-6 text-right">
                                                    <p className="text-xl font-black text-slate-900 tracking-tighter leading-none">{row.totalPaid.toLocaleString()}</p>
                                                    <p className="text-[9px] text-slate-400 font-bold uppercase mt-1 tracking-widest">{row.count} ITEMS</p>
                                                </td>
                                            </tr>
                                        )) : (
                                            <tr>
                                                <td colSpan="7" className="py-32 text-center opacity-30 font-bold italic">ไม่พบข้อมูล... กรุณาอัปโหลดไฟล์</td>
                                            </tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
