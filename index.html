<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mounjaro Injection Tracking - Summary Dashboard Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Sarabun', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .sort-header { cursor: pointer; user-select: none; transition: background-color 0.2s; }
        .sort-header:hover { background-color: #f1f5f9; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        @keyframes countUp {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ai-panel { animation: fadeInUp 0.45s cubic-bezier(.16,1,.3,1); }
        .report-block { animation: fadeInUp 0.4s ease both; }
        .report-block:nth-child(1) { animation-delay: 0.04s; }
        .report-block:nth-child(2) { animation-delay: 0.08s; }
        .report-block:nth-child(3) { animation-delay: 0.12s; }
        .report-block:nth-child(4) { animation-delay: 0.16s; }
        .report-block:nth-child(5) { animation-delay: 0.20s; }
        .report-block:nth-child(6) { animation-delay: 0.24s; }

        .ai-shimmer {
            background: linear-gradient(90deg, #1d4ed8, #3b82f6, #818cf8, #3b82f6, #1d4ed8);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 2.5s linear infinite;
        }

        .pill-up   { background:#dcfce7; color:#166534; }
        .pill-down { background:#fee2e2; color:#991b1b; }
        .pill-neu  { background:#f1f5f9; color:#64748b; }

        .grade-A { background: linear-gradient(135deg,#059669,#10b981); }
        .grade-B { background: linear-gradient(135deg,#2563eb,#3b82f6); }
        .grade-C { background: linear-gradient(135deg,#d97706,#f59e0b); }
        .grade-D { background: linear-gradient(135deg,#dc2626,#ef4444); }

        .tag { display:inline-block; font-size:.65rem; font-weight:800; padding:1px 8px; border-radius:999px; }
        .tag-blue  { background:#dbeafe; color:#1e40af; }
        .tag-green { background:#dcfce7; color:#166534; }
        .tag-amber { background:#fef3c7; color:#92400e; }
        .tag-red   { background:#fee2e2; color:#991b1b; }
        .tag-slate { background:#f1f5f9; color:#64748b; }

        .divider { border:none; border-top:1px solid #e2e8f0; margin:14px 0; }

        .copy-btn:active { transform: scale(0.96); }
    </style>
</head>
<body class="bg-slate-50">
<div id="root"></div>
<script type="text/babel">
    const { useState, useMemo, useRef } = React;

    /* ── icons ── */
    const Icon = ({ name, size = 20, className = "" }) => {
        const p = {
            upload:    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4m14-7-5-5-5 5m5-5v12"/>,
            download:  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4m-7-11v12m-4-4 4 4 4-4"/>,
            search:    <><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></>,
            calendar:  <><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></>,
            user:      <><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>,
            users:     <><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
            dollar:    <><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></>,
            syringe:   <><path d="m18 2 4 4"/><path d="m17 7 3-3"/><path d="M19 9 8.7 19.3c-.7.7-1.6 1.2-2.6 1.5l-4.1.9.9-4.1c.3-1 1.2-1.9 1.5-2.6L14.7 4.7"/><path d="m18 5 3 3"/><path d="m14 10 4 4"/></>,
            refresh:   <><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></>,
            shopping:  <><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></>,
            x:         <path d="M18 6 6 18M6 6l12 12"/>,
            arrowUp:   <path d="m18 15-6-6-6 6"/>,
            arrowDown: <path d="m6 9 6 6 6-6"/>,
            arrowUpDown:<><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></>,
            sparkles:  <><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></>,
            copy:      <><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></>,
            check:     <path d="M20 6 9 17l-5-5"/>,
            chart:     <><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></>,
            alert:     <><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></>,
            target:    <><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></>,
            trophy:    <><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></>,
            lightbulb: <><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></>,
        };
        return (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {p[name]}
            </svg>
        );
    };

    /* ══════════════════════════════════════════════════════════
       OFFLINE AI SUMMARY ENGINE
    ══════════════════════════════════════════════════════════ */
    const generateOfflineSummary = (stats, filteredData, startDate, endDate) => {
        const total = filteredData.length;
        if (total === 0) return null;

        const periodLabel = startDate && endDate ? `${startDate} — ${endDate}`
            : startDate ? `ตั้งแต่ ${startDate}` : endDate ? `ถึง ${endDate}` : "ข้อมูลทั้งหมด";

        /* ── derived numbers ── */
        const avgInject = stats.injectionCustomers > 0
            ? (stats.mounjaroInjections / stats.injectionCustomers) : 0;
        const avgSpend = total > 0 ? stats.revenue / total : 0;
        const mounjaroRatio = stats.revenue > 0
            ? (stats.mounjaroRevenue / stats.revenue) * 100 : 0;
        const newRatio = total > 0 ? (stats.newCount / total) * 100 : 0;
        const retentionRate = stats.mounjaroUniqueCustomers > 0
            ? (stats.injectionCustomers / stats.mounjaroUniqueCustomers) * 100 : 0;
        const injectionConversion = stats.mounjaroUniqueCustomers > 0
            ? (stats.injectionCustomers / stats.mounjaroUniqueCustomers) * 100 : 0;

        /* ── injection distribution ── */
        const dist = { d1: 0, d2: 0, d3: 0, d4: 0 };
        filteredData.forEach(d => {
            if (d.mounjaroInjections === 1) dist.d1++;
            else if (d.mounjaroInjections >= 2 && d.mounjaroInjections <= 3) dist.d2++;
            else if (d.mounjaroInjections >= 4 && d.mounjaroInjections <= 6) dist.d3++;
            else if (d.mounjaroInjections >= 7) dist.d4++;
        });

        /* ── top 5 injectors ── */
        const topInjectors = [...filteredData]
            .filter(d => d.mounjaroInjections > 0)
            .sort((a, b) => b.mounjaroInjections - a.mounjaroInjections)
            .slice(0, 5);

        /* ── top 5 spenders ── */
        const topSpenders = [...filteredData]
            .sort((a, b) => b.totalPaid - a.totalPaid)
            .slice(0, 3);

        /* ── loyalty segments ── */
        const loyal = filteredData.filter(d => d.mounjaroInjections >= 4).length;
        const casual = filteredData.filter(d => d.mounjaroInjections >= 1 && d.mounjaroInjections <= 3).length;
        const noInject = filteredData.filter(d => d.mounjaroInjections === 0).length;

        /* ── overall grade ── */
        let gradeScore = 0;
        if (retentionRate >= 70) gradeScore += 3; else if (retentionRate >= 50) gradeScore += 2; else gradeScore += 1;
        if (avgInject >= 4) gradeScore += 3; else if (avgInject >= 2) gradeScore += 2; else gradeScore += 1;
        if (newRatio >= 30) gradeScore += 2; else gradeScore += 1;
        if (mounjaroRatio >= 60) gradeScore += 2; else gradeScore += 1;
        const grade = gradeScore >= 9 ? 'A' : gradeScore >= 7 ? 'B' : gradeScore >= 5 ? 'C' : 'D';
        const gradeLabel = { A: 'ดีเยี่ยม', B: 'ดี', C: 'พอใช้', D: 'ต้องปรับปรุง' };

        /* ── headline ── */
        let headline = '';
        if (grade === 'A') headline = `ธุรกิจ Mounjaro อยู่ในสภาพแข็งแกร่ง — ลูกค้ามีความต่อเนื่องสูงและยอดขายดีเยี่ยม`;
        else if (grade === 'B') headline = `ภาพรวมอยู่ในเกณฑ์ดี — มีโอกาสเพิ่มความถี่การฉีดและดึงลูกค้าให้กลับมาได้อีก`;
        else if (grade === 'C') headline = `ยอดขายและการฉีดอยู่ในระดับกลาง — ควรเพิ่มกลยุทธ์ดูแลลูกค้าเดิมและหาลูกค้าใหม่`;
        else headline = `ตัวเลขยังต่ำกว่าเกณฑ์ — จำเป็นต้องทบทวนแผนการตลาดและการดูแลลูกค้าอย่างเร่งด่วน`;

        /* ── insights ── */
        const insights = [];

        // Revenue insight
        if (mounjaroRatio >= 60) insights.push(`💰 Mounjaro คิดเป็น ${mounjaroRatio.toFixed(0)}% ของยอดขายรวม — ถือเป็นผลิตภัณฑ์หลักของคลินิก`);
        else insights.push(`💰 Mounjaro คิดเป็น ${mounjaroRatio.toFixed(0)}% ของยอดขายรวม — ยังมีสินค้าอื่นกระจายรายได้อยู่`);

        // Retention insight
        if (retentionRate >= 70) insights.push(`🔄 อัตราการฉีดจริง ${retentionRate.toFixed(0)}% — ลูกค้าส่วนใหญ่ที่ซื้อ Mounjaro ฉีดจริงแล้ว ถือว่าดีมาก`);
        else if (retentionRate >= 40) insights.push(`🔄 อัตราการฉีดจริง ${retentionRate.toFixed(0)}% — ยังมีลูกค้าที่ซื้อแต่ยังไม่ได้ฉีด ควรติดตามกลุ่มนี้`);
        else insights.push(`🔄 อัตราการฉีดจริงเพียง ${retentionRate.toFixed(0)}% — มีลูกค้าจำนวนมากที่ยังไม่ได้เริ่มโปรแกรม`);

        // Average injection
        if (avgInject >= 4) insights.push(`💉 เฉลี่ย ${avgInject.toFixed(1)} ครั้ง/คน — ลูกค้ามีความต่อเนื่องในการรักษาสูง`);
        else if (avgInject >= 2) insights.push(`💉 เฉลี่ย ${avgInject.toFixed(1)} ครั้ง/คน — บางส่วนฉีดเพียง 1-2 ครั้งแล้วหยุด ควรติดตาม`);
        else insights.push(`💉 เฉลี่ยเพียง ${avgInject.toFixed(1)} ครั้ง/คน — ลูกค้าส่วนใหญ่ฉีดน้อยครั้ง อาจต้องให้ความรู้เพิ่มเติม`);

        // New vs old
        if (newRatio >= 40) insights.push(`🆕 ลูกค้าใหม่ ${newRatio.toFixed(0)}% — มีการเติบโตของฐานลูกค้าที่ดี`);
        else if (newRatio >= 20) insights.push(`🆕 ลูกค้าใหม่ ${newRatio.toFixed(0)}% — ควรเพิ่มการหาลูกค้าใหม่เพื่อขยายฐาน`);
        else insights.push(`🆕 ลูกค้าใหม่เพียง ${newRatio.toFixed(0)}% — ฐานลูกค้าส่วนใหญ่เป็นลูกค้าเดิม ควรเปิดช่องทางรับลูกค้าใหม่`);

        // Loyal segment
        if (loyal > 0) insights.push(`⭐ มีลูกค้า Loyal ${loyal} ราย (ฉีด 4+ ครั้ง) — กลุ่มนี้มีมูลค่าสูงสุดและควรได้รับ VIP care`);

        if (dist.d1 > dist.d2 + dist.d3 + dist.d4) {
            insights.push(`⚠️ ลูกค้าส่วนใหญ่ฉีดเพียง 1 ครั้ง (${dist.d1} ราย) — Drop-off สูง ควรสำรวจสาเหตุที่ลูกค้าไม่กลับมา`);
        }

        /* ── recommendations ── */
        const recs = [];
        if (retentionRate < 60) recs.push(`📞 ติดตาม ${noInject} รายที่ซื้อแต่ยังไม่ฉีด — โทรนัดหมายหรือส่ง reminder เพื่อเริ่มโปรแกรม`);
        if (dist.d1 > 5) recs.push(`💌 จัดทำ Follow-up program สำหรับลูกค้าที่ฉีดครั้งแรก เช่น โทรถามผลหลัง 1 สัปดาห์ เพื่อลด Drop-off`);
        if (loyal > 0) recs.push(`👑 สร้าง VIP Program สำหรับ ${loyal} รายที่ฉีด 4+ ครั้ง เช่น ส่วนลดพิเศษ หรือ Priority booking`);
        if (newRatio < 25) recs.push(`📣 เพิ่มการตลาดเพื่อดึงลูกค้าใหม่ เช่น Referral program ให้ลูกค้าเดิมแนะนำเพื่อน`);
        if (mounjaroRatio < 50) recs.push(`🔗 สร้าง Package รวม Mounjaro กับบริการเสริมอื่น เพื่อเพิ่มสัดส่วนรายได้จาก Mounjaro`);
        recs.push(`📊 ทบทวนข้อมูลทุกเดือนเพื่อติดตามแนวโน้มและปรับกลยุทธ์อย่างต่อเนื่อง`);

        /* ── risk flags ── */
        const risks = [];
        if (dist.d1 / (stats.injectionCustomers || 1) > 0.5) risks.push(`Drop-off หลังฉีดครั้งแรกสูงกว่า 50% — ลูกค้าส่วนใหญ่ไม่กลับมาฉีดครั้งที่ 2`);
        if (newRatio < 15) risks.push(`ลูกค้าใหม่น้อยมาก (${newRatio.toFixed(0)}%) — ฐานลูกค้าอาจหดตัวในระยะยาวหากไม่มีการตลาด`);
        if (retentionRate < 30) risks.push(`อัตราการฉีดจริงต่ำมาก — อาจมีปัญหาด้านราคา, การนัดหมาย หรือ ความเชื่อมั่นในผลิตภัณฑ์`);
        if (topSpenders.length > 0 && topSpenders[0].totalPaid > stats.revenue * 0.3) risks.push(`ลูกค้ารายเดียวมียอดสูงถึง ${((topSpenders[0].totalPaid / stats.revenue) * 100).toFixed(0)}% ของรายได้รวม — ความเสี่ยงหากลูกค้ารายนี้หยุดใช้บริการ`);

        return {
            grade, gradeLabel: gradeLabel[grade], headline, periodLabel,
            keyMetrics: [
                { label: 'ยอดขายรวม', value: `฿${stats.revenue.toLocaleString()}`, note: `Mounjaro ${mounjaroRatio.toFixed(0)}%`, trend: mounjaroRatio >= 50 ? 'up' : 'neu' },
                { label: 'ฉีดทั้งหมด', value: `${stats.mounjaroInjections} ครั้ง`, note: `เฉลี่ย ${avgInject.toFixed(1)} ครั้ง/คน`, trend: avgInject >= 3 ? 'up' : avgInject >= 1.5 ? 'neu' : 'down' },
                { label: 'อัตราฉีดจริง', value: `${retentionRate.toFixed(0)}%`, note: `${stats.injectionCustomers}/${stats.mounjaroUniqueCustomers} ราย`, trend: retentionRate >= 60 ? 'up' : retentionRate >= 35 ? 'neu' : 'down' },
                { label: 'ลูกค้าใหม่', value: `${stats.newCount} ราย`, note: `${newRatio.toFixed(0)}% ของทั้งหมด`, trend: newRatio >= 30 ? 'up' : newRatio >= 15 ? 'neu' : 'down' },
                { label: 'ยอดซื้อเฉลี่ย', value: `฿${Math.round(avgSpend).toLocaleString()}`, note: `ต่อราย', trend: 'neu` },
                { label: 'Loyal (4+ ครั้ง)', value: `${loyal} ราย`, note: `${total > 0 ? ((loyal / total) * 100).toFixed(0) : 0}% ของทั้งหมด`, trend: loyal >= 5 ? 'up' : loyal >= 2 ? 'neu' : 'down' },
            ],
            dist, total, loyal, casual, noInject,
            topInjectors, topSpenders,
            insights, recs, risks,
            stats,
        };
    };

    /* ══════════════════════════════════════════════════════════
       AI SUMMARY PANEL COMPONENT
    ══════════════════════════════════════════════════════════ */
    const AISummaryPanel = ({ stats, filteredData, startDate, endDate }) => {
        const [isOpen, setIsOpen] = useState(false);
        const [copied, setCopied] = useState(false);

        const report = useMemo(() => {
            if (!isOpen || filteredData.length === 0) return null;
            return generateOfflineSummary(stats, filteredData, startDate, endDate);
        }, [isOpen, filteredData, stats, startDate, endDate]);

        const trendBadge = (t) => {
            if (t === 'up')   return <span className="tag pill-up ml-1">▲ ดี</span>;
            if (t === 'down') return <span className="tag pill-down ml-1">▼ ต่ำ</span>;
            return <span className="tag pill-neu ml-1">→ ปกติ</span>;
        };

        const copyText = () => {
            if (!report) return;
            const lines = [
                `📋 AI SUMMARY REPORT — ${report.periodLabel}`,
                `🏆 เกรดภาพรวม: ${report.grade} (${report.gradeLabel})`,
                ``,
                `💡 ${report.headline}`,
                ``,
                `📊 ตัวชี้วัด:`,
                ...report.keyMetrics.map(m => `• ${m.label}: ${m.value} — ${m.note}`),
                ``,
                `🔍 สิ่งที่ค้นพบ:`,
                ...report.insights.map(i => `• ${i}`),
                ``,
                `📌 คำแนะนำ:`,
                ...report.recs.map(r => `• ${r}`),
                ...(report.risks.length > 0 ? [``, `⚠️ จุดเฝ้าระวัง:`, ...report.risks.map(r => `• ${r}`)] : []),
            ].join('\n');
            navigator.clipboard.writeText(lines).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); });
        };

        const gradeClass = { A: 'grade-A', B: 'grade-B', C: 'grade-C', D: 'grade-D' };

        return (
            <div className="mb-8">
                {/* Trigger */}
                <button
                    onClick={() => setIsOpen(v => !v)}
                    disabled={filteredData.length === 0}
                    className={`w-full flex items-center justify-center gap-3 py-4 px-8 rounded-[2rem] font-black text-white transition-all duration-200
                        ${filteredData.length === 0
                            ? 'bg-slate-200 text-slate-400 cursor-not-allowed'
                            : isOpen
                                ? 'bg-slate-700 hover:bg-slate-800 shadow-lg'
                                : 'bg-gradient-to-r from-blue-700 via-blue-600 to-indigo-600 hover:from-blue-800 hover:to-indigo-700 shadow-lg shadow-blue-200'
                        }`}
                >
                    <Icon name="sparkles" size={20} />
                    <span>{isOpen ? 'ซ่อนรายงาน AI Summary' : 'สร้างรายงาน AI Summary'}</span>
                    {!isOpen && <span className="text-blue-200 text-xs font-bold ml-1 bg-white/10 px-2 py-0.5 rounded-full">OFFLINE</span>}
                </button>

                {/* Panel */}
                {isOpen && report && (
                    <div className="ai-panel mt-4 bg-white rounded-[2rem] border-2 border-blue-100 shadow-2xl shadow-blue-50 overflow-hidden">

                        {/* Panel header */}
                        <div className="bg-gradient-to-r from-blue-800 via-blue-700 to-indigo-700 px-8 py-5 flex justify-between items-center">
                            <div className="flex items-center gap-4">
                                {/* Grade badge */}
                                <div className={`w-14 h-14 rounded-2xl flex flex-col items-center justify-center text-white font-black shadow-lg ${gradeClass[report.grade]}`}>
                                    <span className="text-2xl leading-none">{report.grade}</span>
                                    <span className="text-[9px] font-bold opacity-80 uppercase leading-none mt-0.5">{report.gradeLabel}</span>
                                </div>
                                <div>
                                    <p className="text-white font-black text-base leading-tight">AI Summary Report</p>
                                    <p className="text-blue-200 text-xs font-bold">{report.periodLabel}</p>
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={copyText} className="copy-btn flex items-center gap-1.5 bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded-xl text-xs font-bold transition-all">
                                    <Icon name={copied ? "check" : "copy"} size={13} />
                                    {copied ? "คัดลอกแล้ว!" : "คัดลอก"}
                                </button>
                                <button onClick={() => setIsOpen(false)} className="bg-white/20 hover:bg-white/30 text-white p-2 rounded-xl transition-all">
                                    <Icon name="x" size={14} />
                                </button>
                            </div>
                        </div>

                        <div className="p-8 space-y-6">

                            {/* Headline */}
                            <div className="report-block bg-gradient-to-br from-blue-50 to-indigo-50 border border-blue-100 rounded-2xl p-5 flex gap-4 items-start">
                                <Icon name="lightbulb" size={22} className="text-blue-600 mt-0.5 shrink-0" />
                                <p className="font-black text-slate-800 text-base leading-snug">{report.headline}</p>
                            </div>

                            {/* Key Metrics */}
                            <div className="report-block">
                                <h2 className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-3 flex items-center gap-2">
                                    <Icon name="chart" size={13} className="text-blue-500" /> ตัวชี้วัดสำคัญ
                                </h2>
                                <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                                    {report.keyMetrics.map((m, i) => (
                                        <div key={i} className="bg-slate-50 border border-slate-100 rounded-2xl p-4">
                                            <p className="text-[9px] font-black uppercase text-slate-400 tracking-widest mb-1">{m.label}</p>
                                            <p className="text-lg font-black text-slate-900 leading-tight">{m.value}</p>
                                            <div className="flex items-center gap-1 mt-1">
                                                <p className="text-[10px] text-slate-400 font-bold">{m.note}</p>
                                                {trendBadge(m.trend)}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Injection Distribution Bar */}
                            <div className="report-block bg-slate-50 border border-slate-100 rounded-2xl p-5">
                                <h2 className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-4 flex items-center gap-2">
                                    <Icon name="syringe" size={13} className="text-blue-500" /> การกระจายจำนวนครั้งฉีดต่อลูกค้า
                                </h2>
                                {[
                                    { label: '1 ครั้ง', val: report.dist.d1, color: 'bg-slate-300' },
                                    { label: '2–3 ครั้ง', val: report.dist.d2, color: 'bg-blue-400' },
                                    { label: '4–6 ครั้ง', val: report.dist.d3, color: 'bg-blue-600' },
                                    { label: '7+ ครั้ง', val: report.dist.d4, color: 'bg-indigo-700' },
                                ].map(({ label, val, color }) => {
                                    const pct = report.stats.injectionCustomers > 0 ? (val / report.stats.injectionCustomers) * 100 : 0;
                                    return (
                                        <div key={label} className="flex items-center gap-3 mb-2.5">
                                            <span className="text-[10px] font-black text-slate-500 w-16 shrink-0">{label}</span>
                                            <div className="flex-1 bg-slate-200 rounded-full h-3 overflow-hidden">
                                                <div className={`${color} h-3 rounded-full transition-all`} style={{ width: `${pct}%` }} />
                                            </div>
                                            <span className="text-[10px] font-black text-slate-600 w-16 text-right shrink-0">{val} ราย ({pct.toFixed(0)}%)</span>
                                        </div>
                                    );
                                })}
                            </div>

                            {/* Customer Segments */}
                            <div className="report-block grid grid-cols-3 gap-3">
                                {[
                                    { label: 'Loyal (4+)', val: report.loyal, color: 'border-t-indigo-600', text: 'text-indigo-600', note: 'ฉีด 4 ครั้งขึ้นไป' },
                                    { label: 'Casual (1–3)', val: report.casual, color: 'border-t-blue-500', text: 'text-blue-600', note: 'ฉีด 1–3 ครั้ง' },
                                    { label: 'ยังไม่ฉีด', val: report.noInject, color: 'border-t-slate-300', text: 'text-slate-500', note: 'ซื้อแต่ไม่ได้ฉีด' },
                                ].map(s => (
                                    <div key={s.label} className={`bg-white border border-slate-100 border-t-4 ${s.color} rounded-2xl p-4 text-center`}>
                                        <p className={`text-[9px] font-black uppercase tracking-widest ${s.text} mb-1`}>{s.label}</p>
                                        <p className="text-2xl font-black text-slate-900">{s.val}</p>
                                        <p className="text-[9px] text-slate-400 font-bold">{s.note}</p>
                                    </div>
                                ))}
                            </div>

                            {/* Top Injectors */}
                            {report.topInjectors.length > 0 && (
                                <div className="report-block">
                                    <h2 className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-3 flex items-center gap-2">
                                        <Icon name="trophy" size={13} className="text-amber-500" /> Top ลูกค้าที่ฉีดมากที่สุด
                                    </h2>
                                    <div className="space-y-2">
                                        {report.topInjectors.map((c, i) => (
                                            <div key={c.hn} className="flex items-center gap-3 bg-slate-50 border border-slate-100 rounded-xl px-4 py-3">
                                                <span className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-black text-white shrink-0
                                                    ${i === 0 ? 'bg-amber-400' : i === 1 ? 'bg-slate-400' : i === 2 ? 'bg-amber-700' : 'bg-slate-200 text-slate-500'}`}>
                                                    {i + 1}
                                                </span>
                                                <div className="flex-1 min-w-0">
                                                    <p className="font-black text-slate-800 text-sm truncate">{c.name}</p>
                                                    <p className="text-[10px] text-slate-400 font-bold">HN: {c.hn}</p>
                                                </div>
                                                <div className="text-right shrink-0">
                                                    <span className="tag tag-blue">{c.mounjaroInjections} ครั้ง</span>
                                                    <p className="text-[10px] text-slate-400 font-bold mt-0.5">฿{c.mounjaroPaid.toLocaleString()}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            <hr className="divider" />

                            {/* Insights */}
                            <div className="report-block">
                                <h2 className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-3 flex items-center gap-2">
                                    <Icon name="target" size={13} className="text-blue-500" /> สิ่งที่ค้นพบ
                                </h2>
                                <ul className="space-y-2">
                                    {report.insights.map((ins, i) => (
                                        <li key={i} className="flex gap-2 items-start text-sm text-slate-700 bg-slate-50 rounded-xl px-4 py-3 border border-slate-100">
                                            <span className="mt-0.5 shrink-0 text-blue-400">▸</span>
                                            <span className="font-medium leading-snug">{ins}</span>
                                        </li>
                                    ))}
                                </ul>
                            </div>

                            {/* Recommendations */}
                            <div className="report-block">
                                <h2 className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-3 flex items-center gap-2">
                                    <Icon name="lightbulb" size={13} className="text-emerald-500" /> คำแนะนำเชิงกลยุทธ์
                                </h2>
                                <ul className="space-y-2">
                                    {report.recs.map((r, i) => (
                                        <li key={i} className="flex gap-2 items-start text-sm text-slate-700 bg-emerald-50 border border-emerald-100 rounded-xl px-4 py-3">
                                            <span className="mt-0.5 shrink-0 text-emerald-500">▸</span>
                                            <span className="font-bold leading-snug">{r}</span>
                                        </li>
                                    ))}
                                </ul>
                            </div>

                            {/* Risk Flags */}
                            {report.risks.length > 0 && (
                                <div className="report-block bg-amber-50 border border-amber-100 rounded-2xl p-5">
                                    <h2 className="text-[10px] font-black uppercase text-amber-600 tracking-widest mb-3 flex items-center gap-2">
                                        <Icon name="alert" size={13} className="text-amber-500" /> จุดที่ต้องเฝ้าระวัง
                                    </h2>
                                    <ul className="space-y-2">
                                        {report.risks.map((r, i) => (
                                            <li key={i} className="flex gap-2 items-start text-sm text-amber-800 font-bold leading-snug">
                                                <span className="mt-0.5 shrink-0">⚠️</span>
                                                <span>{r}</span>
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                            )}

                        </div>
                    </div>
                )}

                {isOpen && filteredData.length === 0 && (
                    <div className="mt-4 p-6 bg-slate-50 border border-slate-200 rounded-2xl text-center text-slate-400 font-bold">
                        กรุณาอัปโหลดข้อมูลก่อนเพื่อดูรายงาน
                    </div>
                )}
            </div>
        );
    };

    /* ══════════════════════════════════════════════════════════
       MAIN APP
    ══════════════════════════════════════════════════════════ */
    const App = () => {
        const [data, setData] = useState([]);
        const [searchTerm, setSearchTerm] = useState('');
        const [startDate, setStartDate] = useState('');
        const [endDate, setEndDate] = useState('');
        const [sortConfig, setSortConfig] = useState({ key: 'lastDateObj', direction: 'desc' });
        const [isProcessing, setIsProcessing] = useState(false);
        const [error, setError] = useState(null);
        const fileInputRef = useRef(null);

        const keywords = ['peptide','เปปไทด์','mounjaro','mouajaro','มอนจาโร','slimnow','สลิมนาว','คุมหิว','ปากกา','ลดน้ำหนัก'];

        const parseDate = (dateStr) => {
            if (!dateStr) return new Date(0);
            if (typeof dateStr === 'number') return new Date((dateStr - 25569) * 86400 * 1000);
            const parts = String(dateStr).split('/');
            if (parts.length === 3) return new Date(parts[2], parts[1] - 1, parts[0]);
            const isoDate = new Date(dateStr);
            return isNaN(isoDate.getTime()) ? new Date(0) : isoDate;
        };

        const handleFileUpload = (event) => {
            const file = event.target.files[0];
            if (!file) return;
            setIsProcessing(true); setError(null);
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const wb = XLSX.read(e.target.result, { type: 'binary' });
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    processRawData(XLSX.utils.sheet_to_json(ws, { header: 1 }));
                } catch {
                    setError("ไม่สามารถประมวลผลไฟล์ได้ กรุณาตรวจสอบรูปแบบไฟล์ Excel");
                    setIsProcessing(false);
                }
            };
            reader.readAsBinaryString(file);
            event.target.value = '';
        };

        const processRawData = (rows) => {
            if (rows.length < 2) { setError("ไม่พบข้อมูลในไฟล์"); setIsProcessing(false); return; }
            const headers = rows[0].map(h => String(h).trim());
            const findIdx = (names) => headers.findIndex(h => names.some(n => h.includes(n)));
            const idx = {
                hn: findIdx(['HN','รหัสคนไข้']), name: findIdx(['ชื่อ-สกุล','ชื่อ','Name']),
                item: findIdx(['รายการ','ชื่อสินค้า','Product']), date: findIdx(['วันที่ขาย','วันที่บริการ','Date']),
                regDate: findIdx(['วันลงทะเบียน','วันที่ลงทะเบียน','Registration Date']),
                paid: findIdx(['ยอดชำระ','ยอดเงิน','Paid']), qty: findIdx(['จำนวน','ครั้ง','Qty','Amount'])
            };
            const grouped = {};
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row || !row[idx.hn]) continue;
                const itemName = String(row[idx.item] || "");
                const lowerItem = itemName.toLowerCase();
                const isMounjaro = lowerItem.includes('mounjaro') || lowerItem.includes('mouajaro') || lowerItem.includes('มอนจาโร');
                const isTarget = keywords.some(k => lowerItem.includes(k.toLowerCase()));
                if (isTarget) {
                    const hn = String(row[idx.hn]).trim();
                    const qty = parseInt(row[idx.qty]) || 0;
                    const paid = parseFloat(String(row[idx.paid]||"0").replace(/,/g,'')) || 0;
                    const serviceDate = parseDate(row[idx.date]);
                    const regDate = parseDate(row[idx.regDate]);
                    if (!grouped[hn]) grouped[hn] = { hn, name: String(row[idx.name]||"-"), items: [], registrationDate: regDate, lastDateObj: serviceDate, totalPaid: 0, mounjaroInjections: 0, mounjaroPaid: 0, mounjaroDates: [], totalQty: 0, count: 0, hasMounjaro: false };
                    if (isMounjaro) {
                        grouped[hn].hasMounjaro = true;
                        grouped[hn].mounjaroPaid += paid;
                        if (lowerItem.includes('[ตัดคอร์ส]')) {
                            grouped[hn].mounjaroInjections += qty;
                            grouped[hn].mounjaroDates.push({ dateObj: serviceDate, dateStr: serviceDate.toLocaleDateString('th-TH'), qty });
                        }
                    }
                    if (!grouped[hn].items.includes(itemName)) grouped[hn].items.push(itemName);
                    grouped[hn].totalPaid += paid; grouped[hn].totalQty += qty; grouped[hn].count += 1;
                    if (serviceDate > grouped[hn].lastDateObj) grouped[hn].lastDateObj = serviceDate;
                }
            }
            Object.values(grouped).forEach(c => c.mounjaroDates.sort((a,b) => b.dateObj - a.dateObj));
            setData(Object.values(grouped)); setIsProcessing(false);
        };

        const handleSort = (key) => {
            setSortConfig(prev => ({ key, direction: prev.key === key && prev.direction === 'desc' ? 'asc' : 'desc' }));
        };

        const filteredData = useMemo(() => {
            const start = startDate ? new Date(startDate) : null;
            const end = endDate ? new Date(endDate) : null;
            if (start) start.setHours(0,0,0,0);
            if (end) end.setHours(23,59,59,999);
            let result = data.filter(item => {
                const matchSearch = item.name.toLowerCase().includes(searchTerm.toLowerCase()) || item.hn.includes(searchTerm);
                let matchDate = true;
                if (start) matchDate = matchDate && item.lastDateObj >= start;
                if (end) matchDate = matchDate && item.lastDateObj <= end;
                return matchSearch && matchDate;
            }).map(item => {
                let status = "เก่า";
                if (start && end) { if (item.registrationDate >= start && item.registrationDate <= end) status = "ใหม่"; }
                else if (start) { if (item.registrationDate >= start) status = "ใหม่"; }
                return { ...item, customerStatus: status };
            });
            result.sort((a, b) => {
                let vA = a[sortConfig.key], vB = b[sortConfig.key];
                if (typeof vA === 'string' && sortConfig.key === 'name') return sortConfig.direction === 'asc' ? vA.localeCompare(vB,'th') : vB.localeCompare(vA,'th');
                if (vA < vB) return sortConfig.direction === 'asc' ? -1 : 1;
                if (vA > vB) return sortConfig.direction === 'asc' ? 1 : -1;
                return 0;
            });
            return result;
        }, [data, searchTerm, startDate, endDate, sortConfig]);

        const stats = useMemo(() => filteredData.reduce((acc, curr) => {
            acc.revenue += curr.totalPaid; acc.mounjaroInjections += curr.mounjaroInjections; acc.mounjaroRevenue += curr.mounjaroPaid;
            if (curr.customerStatus === 'ใหม่') acc.newCount++; else acc.oldCount++;
            if (curr.totalPaid > 0) acc.buyingCustomers++;
            if (curr.mounjaroInjections > 0) acc.injectionCustomers++;
            if (curr.hasMounjaro) acc.mounjaroUniqueCustomers++;
            return acc;
        }, { revenue:0, mounjaroInjections:0, mounjaroRevenue:0, newCount:0, oldCount:0, buyingCustomers:0, injectionCustomers:0, mounjaroUniqueCustomers:0 }), [filteredData]);

        const handleReset = () => { setData([]); setSearchTerm(''); setStartDate(''); setEndDate(''); setSortConfig({ key:'lastDateObj', direction:'desc' }); setError(null); };

        const getSortIcon = (key) => {
            if (sortConfig.key !== key) return <Icon name="arrowUpDown" size={12} className="text-slate-300 ml-1 opacity-50" />;
            return sortConfig.direction === 'asc' ? <Icon name="arrowUp" size={12} className="text-blue-600 ml-1" /> : <Icon name="arrowDown" size={12} className="text-blue-600 ml-1" />;
        };

        const handleExport = () => {
            if (filteredData.length === 0) return;
            const rows = filteredData.map((item, i) => ({
                "ลำดับ": i+1, "HN": item.hn, "ชื่อ-สกุล": item.name,
                "ประเภทลูกค้า": item.customerStatus==="ใหม่"?"ลูกค้าใหม่":"ลูกค้าเก่า",
                "จำนวนฉีด Mounjaro": item.mounjaroInjections, "ยอดซื้อเฉพาะ Mounjaro": item.mounjaroPaid,
                "บริการล่าสุด": item.lastDateObj.toLocaleDateString('th-TH'),
                "ประวัติวันที่ฉีด": item.mounjaroDates.map(d=>`${d.dateStr}(${d.qty})`).join(', '),
                "ยอดซื้อรวม": item.totalPaid
            }));
            const ws = XLSX.utils.json_to_sheet(rows);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Report");
            XLSX.writeFile(wb, `Mounjaro_History_${new Date().toISOString().split('T')[0]}.xlsx`);
        };

        return (
            <div className="min-h-screen pb-20">
                <div className="max-w-7xl mx-auto px-4 py-8">

                    {/* Header */}
                    <header className="flex flex-col md:flex-row justify-between items-end gap-6 mb-10">
                        <div>
                            <h1 className="text-4xl font-black text-slate-900 tracking-tight">Injection <span className="text-blue-600">History</span></h1>
                            <p className="text-slate-500 mt-2 font-medium italic underline decoration-blue-200 decoration-2">ระบบวิเคราะห์ข้อมูลลูกค้า Mounjaro แบบครบวงจร</p>
                        </div>
                        <div className="flex flex-wrap justify-end gap-3">
                            <button onClick={handleReset} className="flex items-center gap-2 bg-white border border-rose-100 text-rose-500 px-6 py-3 rounded-2xl shadow-sm font-bold hover:bg-rose-50 transition-all">
                                <Icon name="refresh" size={18} /> รีเฟรช
                            </button>
                            <button onClick={handleExport} disabled={filteredData.length===0} className="flex items-center gap-2 bg-emerald-600 text-white px-6 py-3 rounded-2xl shadow-lg shadow-emerald-200 font-bold hover:bg-emerald-700 disabled:opacity-50 transition-all">
                                <Icon name="download" /> Export XLSX
                            </button>
                            <button onClick={() => fileInputRef.current.click()} className="flex items-center gap-2 bg-white border border-slate-200 px-6 py-3 rounded-2xl shadow-sm font-bold hover:bg-slate-50 transition-all">
                                <Icon name="upload" className="text-blue-600" /> อัปโหลด
                            </button>
                            <input type="file" ref={fileInputRef} className="hidden" onChange={handleFileUpload} accept=".xlsx,.xls,.csv" />
                        </div>
                    </header>

                    {/* Stats */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                        <div className="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm flex items-center gap-5">
                            <div className="p-4 bg-blue-50 text-blue-600 rounded-3xl"><Icon name="dollar" size={32} /></div>
                            <div>
                                <span className="text-[10px] font-black uppercase text-slate-400 tracking-widest block">ยอดขายรวมกลุ่มเป้าหมาย</span>
                                <h3 className="text-3xl font-black text-slate-900">{stats.revenue.toLocaleString()} <span className="text-sm font-bold text-slate-400">บาท</span></h3>
                            </div>
                        </div>
                        <div className="bg-white p-6 rounded-[2rem] border border-blue-200 shadow-md bg-gradient-to-br from-white to-blue-50/30 flex items-center gap-5">
                            <div className="p-4 bg-blue-600 text-white rounded-3xl"><Icon name="syringe" size={32} /></div>
                            <div className="flex-1">
                                <div className="flex justify-between items-start">
                                    <span className="text-[10px] font-black uppercase text-blue-600 tracking-widest block">ฉีด Mounjaro ทั้งหมด</span>
                                    <div className="text-right">
                                        <span className="text-[10px] font-black uppercase text-emerald-600 block">ยอดขาย Mounjaro</span>
                                        <span className="text-sm font-black text-emerald-600 tracking-tighter">฿{stats.mounjaroRevenue.toLocaleString()}</span>
                                    </div>
                                </div>
                                <h3 className="text-3xl font-black text-blue-600">{stats.mounjaroInjections.toLocaleString()} <span className="text-sm font-bold">ครั้ง</span></h3>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-2 md:grid-cols-6 gap-3 mb-8">
                        {[
                            { label:'ลูกค้าทั้งหมด', val:filteredData.length, color:'border-t-slate-400' },
                            { label:'ลูกค้า Mounjaro', val:stats.mounjaroUniqueCustomers, color:'border-t-blue-600' },
                            { label:'ที่มีการซื้อ', val:stats.buyingCustomers, color:'border-t-emerald-500' },
                            { label:'ที่ฉีดจริง', val:stats.injectionCustomers, color:'border-t-purple-500' },
                            { label:'ลูกค้าใหม่', val:stats.newCount, color:'border-t-blue-400' },
                            { label:'ลูกค้าเก่า', val:stats.oldCount, color:'border-t-slate-300' },
                        ].map(s => (
                            <div key={s.label} className={`bg-white p-4 rounded-3xl border border-slate-100 shadow-sm border-t-4 ${s.color}`}>
                                <p className="text-[9px] font-black uppercase text-slate-400 mb-2">{s.label}</p>
                                <h4 className="text-lg font-black text-slate-900">{s.val} <span className="text-[9px] font-bold text-slate-400 uppercase">HN</span></h4>
                            </div>
                        ))}
                    </div>

                    {/* Filters */}
                    <div className="bg-white rounded-[2rem] border border-slate-200 p-6 mb-8 grid grid-cols-1 md:grid-cols-3 gap-4 shadow-sm">
                        <div className="relative">
                            <Icon name="calendar" className="absolute left-4 top-3.5 text-slate-400" size={16} />
                            <input type="date" className="w-full bg-slate-50 px-12 py-3 rounded-xl outline-none text-sm font-bold border-none" value={startDate} onChange={e => setStartDate(e.target.value)} />
                            <span className="absolute -top-2 left-4 bg-white px-1 text-[10px] font-bold text-blue-600 uppercase tracking-tighter leading-none">บริการล่าสุดเริ่มจาก</span>
                        </div>
                        <div className="relative">
                            <Icon name="calendar" className="absolute left-4 top-3.5 text-slate-400" size={16} />
                            <input type="date" className="w-full bg-slate-50 px-12 py-3 rounded-xl outline-none text-sm font-bold border-none" value={endDate} onChange={e => setEndDate(e.target.value)} />
                            <span className="absolute -top-2 left-4 bg-white px-1 text-[10px] font-bold text-blue-600 uppercase tracking-tighter leading-none">ถึงวันที่</span>
                        </div>
                        <div className="relative">
                            <Icon name="search" className="absolute left-4 top-3.5 text-slate-400" size={18} />
                            <input type="text" placeholder="ค้นชื่อ หรือ HN..." className="w-full bg-slate-50 pl-12 pr-4 py-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-sm font-bold transition-all" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                            <span className="absolute -top-2 left-4 bg-white px-1 text-[10px] font-bold text-slate-400 uppercase tracking-tighter leading-none">ค้นหาข้อมูล</span>
                        </div>
                    </div>

                    {error && (
                        <div className="mb-8 p-4 bg-rose-50 border-l-4 border-rose-500 text-rose-700 flex items-center gap-3 rounded-r-xl">
                            <Icon name="x" className="text-rose-500" /><p className="font-bold text-sm">{error}</p>
                        </div>
                    )}

                    {/* AI SUMMARY */}
                    <AISummaryPanel stats={stats} filteredData={filteredData} startDate={startDate} endDate={endDate} />

                    {/* Table */}
                    <div className="bg-white rounded-[2.5rem] shadow-xl border border-slate-100 overflow-hidden">
                        <div className="overflow-x-auto custom-scrollbar">
                            <table className="w-full text-left border-collapse">
                                <thead className="bg-slate-50/80 text-[10px] uppercase font-black text-slate-400 tracking-widest border-b border-slate-100">
                                    <tr>
                                        <th className="px-8 py-5">#</th>
                                        <th className="px-8 py-5 sort-header" onClick={() => handleSort('name')}><div className="flex items-center">ลูกค้า (HN) {getSortIcon('name')}</div></th>
                                        <th className="px-8 py-5 text-center sort-header" onClick={() => handleSort('customerStatus')}><div className="flex items-center justify-center">ประเภท {getSortIcon('customerStatus')}</div></th>
                                        <th className="px-8 py-5 text-center sort-header" onClick={() => handleSort('mounjaroInjections')}><div className="flex items-center justify-center">ฉีด Mounjaro {getSortIcon('mounjaroInjections')}</div></th>
                                        <th className="px-8 py-5 text-center sort-header" onClick={() => handleSort('lastDateObj')}><div className="flex items-center justify-center text-blue-600 font-black">บริการล่าสุด {getSortIcon('lastDateObj')}</div></th>
                                        <th className="px-8 py-5">รายการสินค้า</th>
                                        <th className="px-8 py-5 text-right sort-header" onClick={() => handleSort('totalPaid')}><div className="flex items-center justify-end">ยอดซื้อรวม {getSortIcon('totalPaid')}</div></th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-50">
                                    {filteredData.length > 0 ? filteredData.map((row, i) => (
                                        <tr key={row.hn} className="hover:bg-blue-50/40 transition-colors group">
                                            <td className="px-8 py-6 text-slate-300 font-bold">{i+1}</td>
                                            <td className="px-8 py-6">
                                                <p className="font-bold text-slate-900 group-hover:text-blue-600 transition-colors leading-tight">{row.name}</p>
                                                <p className="text-[10px] text-slate-400 font-bold tracking-tighter uppercase mt-0.5">HN: {row.hn}</p>
                                            </td>
                                            <td className="px-8 py-6 text-center">
                                                <span className={`px-3 py-1 rounded-full text-[10px] font-black border tracking-tighter ${row.customerStatus==='ใหม่'?'bg-emerald-50 text-emerald-600 border-emerald-100':'bg-slate-50 text-slate-400 border-slate-100'}`}>
                                                    {row.customerStatus==='ใหม่'?'ลูกค้าใหม่':'ลูกค้าเก่า'}
                                                </span>
                                            </td>
                                            <td className="px-8 py-6">
                                                <div className="flex flex-col items-center">
                                                    <span className={`text-base font-black px-6 py-2 rounded-2xl mb-3 shadow-sm ${row.mounjaroInjections>0?'bg-blue-600 text-white':'bg-slate-100 text-slate-300'}`}>
                                                        {row.mounjaroInjections} ครั้ง
                                                    </span>
                                                    {row.mounjaroDates && row.mounjaroDates.length > 0 && (
                                                        <div className="flex flex-col gap-1.5 w-full max-w-[140px]">
                                                            {row.mounjaroDates.map((d, idx) => (
                                                                <div key={idx} className="flex justify-between items-center text-[10px] text-blue-700 bg-blue-50 px-2.5 py-1 rounded-lg border border-blue-100 font-bold">
                                                                    <span>{d.dateStr}</span>
                                                                    <span className="bg-blue-600 text-white px-1.5 rounded-full text-[8px]">{d.qty}</span>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>
                                            </td>
                                            <td className="px-8 py-6 text-center">
                                                <div className="bg-blue-50/50 p-2 rounded-xl border border-blue-100/50 inline-block min-w-[100px]">
                                                    <p className="text-sm font-black text-blue-700">{row.lastDateObj.toLocaleDateString('th-TH')}</p>
                                                    <p className="text-[9px] text-blue-400 font-bold uppercase tracking-tighter italic leading-none mt-1">LATEST SERVICE</p>
                                                </div>
                                            </td>
                                            <td className="px-8 py-6">
                                                <div className="flex flex-wrap gap-1 max-w-[180px]">
                                                    {row.items.map((it, idx) => (
                                                        <span key={idx} className={`text-[9px] px-2 py-0.5 rounded-lg border leading-relaxed ${it.includes('[ตัดคอร์ส]')?'bg-blue-100 text-blue-700 border-blue-200 font-bold':'bg-slate-50 text-slate-400 border-slate-100'}`}>
                                                            {it}
                                                        </span>
                                                    ))}
                                                </div>
                                            </td>
                                            <td className="px-8 py-6 text-right">
                                                <p className="text-xl font-black text-slate-900 tracking-tighter leading-none">{row.totalPaid.toLocaleString()}</p>
                                                <p className="text-[9px] text-slate-400 font-bold uppercase mt-1 tracking-widest">{row.count} ITEMS</p>
                                            </td>
                                        </tr>
                                    )) : (
                                        <tr><td colSpan="7" className="py-32 text-center opacity-30 font-bold italic">ไม่พบข้อมูล... กรุณาอัปโหลดไฟล์</td></tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>

                </div>
            </div>
        );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
